<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>AI Support OS • Enterprise Console</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
--bg:#f4f6fb;
--panel:#fff;
--border:#e5e7eb;
--text:#0f172a;
--muted:#64748b;
--nav1:#0b1220;
--nav2:#0f1a35;
--accent:#16a34a;
--warn:#f59e0b;
--danger:#dc2626;
--radius:16px;
--shadow:0 10px 30px rgba(2,6,23,.08);
}

*{box-sizing:border-box}
body{margin:0;font-family:system-ui;background:var(--bg);color:var(--text)}
.app{display:grid;grid-template-columns:260px 1fr;min-height:100vh}
.sidebar{background:linear-gradient(180deg,var(--nav1),var(--nav2));color:#fff;padding:20px}
.brand{display:flex;gap:10px;align-items:center;margin-bottom:30px}
.logo{width:42px;height:42px;border-radius:12px;background:rgba(22,163,74,.2);display:grid;place-items:center;font-weight:900;color:#bbf7d0}
.nav button{width:100%;background:none;border:1px solid transparent;color:#fff;padding:10px;border-radius:12px;text-align:left;font-weight:700;cursor:pointer;margin-bottom:6px}
.nav button.active{background:rgba(22,163,74,.2);border-color:rgba(22,163,74,.4)}

.main{padding:30px;padding-bottom:120px}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.title{font-size:20px;font-weight:900}
.pill{padding:6px 12px;border-radius:999px;font-size:12px;border:1px solid var(--border)}
.pill.ok{background:#dcfce7;color:#065f46}
.pill.warn{background:#fef3c7;color:#92400e}
.pill.bad{background:#fee2e2;color:#7f1d1d}

.card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:20px}
.cardhd{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.cardbd{padding:18px}
.hidden{display:none}

input,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--border);margin-top:6px}
textarea{min-height:120px}

.btn{padding:8px 14px;border-radius:10px;border:1px solid var(--border);background:#fff;font-weight:700;cursor:pointer}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.warn{background:#fef3c7;border-color:#f59e0b;color:#92400e}
.btn.danger{background:#fee2e2;border-color:#dc2626;color:#7f1d1d}

.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.kpi{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.kpi h3{margin:0;font-size:20px;font-weight:900}
.kpi span{font-size:12px;color:var(--muted)}

.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}

.actionbar{
position:fixed;bottom:20px;left:280px;right:20px;
background:#fff;border:1px solid var(--border);
border-radius:20px;box-shadow:0 20px 50px rgba(0,0,0,.1);
padding:12px 20px;display:flex;justify-content:space-between;align-items:center
}

@media(max-width:1100px){
.app{grid-template-columns:1fr}
.sidebar{display:none}
.kpis{grid-template-columns:1fr}
.chart-grid{grid-template-columns:1fr}
.actionbar{left:20px}
}
</style>
</head>
<body>

<div class="app">

<aside class="sidebar">
<div class="brand">
<div class="logo">AI</div>
<div>
<div style="font-weight:900">AI Support OS</div>
<div style="font-size:12px;opacity:.7">Enterprise</div>
</div>
</div>

<div class="nav">
<button data-tab="overview">Overview</button>
<button data-tab="rules">Rules</button>
<button data-tab="faq">FAQ</button>
<button data-tab="test">Preview</button>
<button data-tab="analytics">Analytics</button>
</div>
</aside>

<main class="main">

<div class="topbar">
<div class="title">Enterprise Admin Console</div>
<div style="display:flex;gap:10px">
<div id="modePill" class="pill warn">Draft</div>
<div id="connPill" class="pill bad">Disconnected</div>
</div>
</div>

<section id="overview">
<div class="card">
<div class="cardhd">
<div>Workspace</div>
<button class="btn primary" onclick="loadAll()">Connect</button>
</div>
<div class="cardbd">
<input id="apiBase" placeholder="Worker Base URL">
<input id="brand" placeholder="Brand (demo)">
<input id="token" type="password" placeholder="Admin Token">
</div>
</div>
</section>

<section id="rules" class="hidden">
<div class="card">
<div class="cardhd">
<div>System Rules</div>
</div>
<div class="cardbd">
<textarea id="rulesBox"></textarea>
</div>
</div>
</section>

<section id="faq" class="hidden">
<div class="card">
<div class="cardhd"><div>FAQ JSON</div></div>
<div class="cardbd">
<textarea id="faqBox"></textarea>
</div>
</div>
</section>

<section id="test" class="hidden">
<div class="card">
<div class="cardhd">
<div>Preview Draft</div>
<button class="btn primary" onclick="runTest()">Run</button>
</div>
<div class="cardbd">
<textarea id="testMsg"></textarea>
<div style="margin-top:20px;font-weight:600" id="replyBox"></div>
</div>
</div>
</section>

<section id="analytics" class="hidden">
<div class="kpis">
<div class="kpi"><h3 id="kTotal">—</h3><span>Total</span></div>
<div class="kpi"><h3 id="kAuto">—</h3><span>Auto</span></div>
<div class="kpi"><h3 id="kEsc">—</h3><span>Escalated</span></div>
<div class="kpi"><h3 id="kConf">—</h3><span>Confidence</span></div>
</div>

<div class="chart-grid">
<div class="card">
<div class="cardhd">Intent</div>
<div class="cardbd"><canvas id="intentChart"></canvas></div>
</div>
<div class="card">
<div class="cardhd">Resolution</div>
<div class="cardbd"><canvas id="resChart"></canvas></div>
</div>
</div>
</section>

</main>
</div>

<div class="actionbar">
<div id="dirtyText">No changes</div>
<div style="display:flex;gap:10px">
<button class="btn" onclick="toggleMode()">Switch Mode</button>
<button class="btn primary" onclick="saveDraft()">Save Draft</button>
<button class="btn warn" onclick="publish()">Publish</button>
</div>
</div>

<script>
let mode="draft"
let dirty=false
let intentChart,resChart

function setDirty(v){
dirty=v
document.getElementById("dirtyText").innerText=v?"Unsaved Changes":"No changes"
}

document.querySelectorAll(".nav button").forEach(btn=>{
btn.onclick=()=>{
location.hash=btn.dataset.tab
}
})

function router(){
const tab=location.hash.replace("#","")||"overview"
document.querySelectorAll("main section").forEach(s=>s.classList.add("hidden"))
document.getElementById(tab)?.classList.remove("hidden")
document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"))
document.querySelector(`[data-tab="${tab}"]`)?.classList.add("active")
}
window.onhashchange=router
router()

function headers(){
return {"Content-Type":"application/json","X-Admin-Token":token.value}
}

async function loadAll(){
try{
const r=await fetch(apiBase.value+"/admin/get?brand="+brand.value,{headers:headers()})
const data=await r.json()
rulesBox.value=(data.draft?.rules||[]).join("\n")
faqBox.value=JSON.stringify(data.draft?.faq||[],null,2)
connPill.className="pill ok"
connPill.innerText="Connected"
}catch{
connPill.className="pill bad"
connPill.innerText="Disconnected"
}
}

rulesBox.oninput=()=>setDirty(true)
faqBox.oninput=()=>setDirty(true)

async function saveDraft(){
const body={
rules:rulesBox.value.split("\n").filter(x=>x.trim()),
faq:JSON.parse(faqBox.value||"[]")
}
await fetch(apiBase.value+"/admin/save?brand="+brand.value,{method:"POST",headers:headers(),body:JSON.stringify(body)})
setDirty(false)
alert("Draft Saved")
}

async function publish(){
await fetch(apiBase.value+"/admin/publish?brand="+brand.value,{method:"POST",headers:headers()})
alert("Published")
}

function toggleMode(){
mode=mode==="draft"?"live":"draft"
modePill.innerText=mode.charAt(0).toUpperCase()+mode.slice(1)
modePill.className="pill "+(mode==="draft"?"warn":"ok")
}

async function runTest(){
const r=await fetch(apiBase.value+"/admin/test?brand="+brand.value,{method:"POST",headers:headers(),body:JSON.stringify({message:testMsg.value,mode})})
const data=await r.json()
replyBox.innerText=data.reply||"No response"
}

async function loadAnalytics(){
const r=await fetch(apiBase.value+"/admin/analytics?brand="+brand.value,{headers:headers()})
const data=await r.json()
const m=data.metrics||{}
kTotal.innerText=m.totalMessages||0
kAuto.innerText=m.autoReply||0
kEsc.innerText=m.escalated||0
kConf.innerText=(m.avgConfidence||0).toFixed(2)

if(intentChart) intentChart.destroy()
if(resChart) resChart.destroy()

intentChart=new Chart(intentChart=document.getElementById("intentChart"),{
type:"pie",
data:{labels:Object.keys(m.intents||{}),datasets:[{data:Object.values(m.intents||{})}]}
})

resChart=new Chart(resChart=document.getElementById("resChart"),{
type:"bar",
data:{labels:["Auto","Escalated","Copilot"],datasets:[{data:[m.autoReply||0,m.escalated||0,m.copilot||0]}]}
})
}

if(location.hash==="#analytics") loadAnalytics()
</script>

</body>
</html>
