<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>AI Support OS • Visual Admin</title>
<style>
:root{--nav:#0f172a;--nav2:#111827;--card:#fff;--bg:#f3f4f6;--muted:#64748b;--ok:#22c55e;--danger:#ef4444;--border:#e5e7eb;--accent:#3b82f6}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui;background:var(--bg);display:flex;min-height:100vh}
/* 侧边栏样式恢复 */
aside{width:240px;background:linear-gradient(180deg,var(--nav),var(--nav2));color:#fff;padding:18px;display:flex;flex-direction:column}
.brand{font-weight:900;font-size:18px;margin-bottom:14px;color:var(--ok)}
.navbtn{width:100%;text-align:left;border:0;border-radius:8px;padding:12px;margin:4px 0;background:transparent;color:#94a3b8;cursor:pointer;font-weight:600}
.navbtn:hover{background:#1f2937;color:#fff}
.navbtn.active{background:var(--ok);color:#052e16}
/* 主内容区 */
main{flex:1;padding:22px;max-width:1200px;overflow-y:auto}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;box-shadow:0 10px 25px rgba(2,6,23,.06);padding:20px;margin-bottom:14px}
/* 可视化 FAQ 卡片 */
.faq-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(320px, 1fr));gap:15px}
.faq-card{background:#fff;border:2px solid var(--border);border-radius:12px;padding:15px;position:relative}
.faq-card:hover{border-color:var(--accent)}
.faq-delete{position:absolute;top:10px;right:10px;background:none;border:0;color:var(--danger);cursor:pointer;font-size:18px}
.faq-cat{display:inline-block;background:var(--bg);padding:4px 8px;border-radius:6px;font-size:11px;font-weight:bold;color:var(--muted);margin-bottom:10px;border:1px solid var(--border)}
/* 按钮与输入 */
input,textarea{border:1px solid var(--border);border-radius:10px;padding:10px;font:inherit;outline:none;width:100%}
.btn{border:0;border-radius:10px;padding:10px 18px;cursor:pointer;font-weight:800;font-size:13px}
.save{background:var(--ok);color:#052e16}
.publish{background:var(--danger);color:#fff}
.add{background:var(--accent);color:#fff;margin-bottom:15px}
pre{background:#0b1220;color:#e5e7eb;border-radius:10px;padding:12px;overflow:auto;font-size:12px}
.hidden{display:none}
</style>
</head>
<body>

<aside>
  <div class="brand">⚡ AI Support OS</div>
  <p class="small" style="padding:0 10px; opacity:0.6; font-size:11px">CONTROL PANEL</p>
  <button class="navbtn active" data-tab="dashboard">Dashboard</button>
  <button class="navbtn" data-tab="rules">AI Behavior</button>
  <button class="navbtn" data-tab="faq">FAQ Library (Visual)</button>
  <button class="navbtn" data-tab="analytics">Analytics</button>
  <button class="navbtn" data-tab="logs">System Logs</button>
  <div style="margin-top:auto; padding:10px;"><a href="./index.html" style="color:var(--ok); text-decoration:none; font-size:12px;">← Open Chat UI</a></div>
</aside>

<main>
  <div class="card">
    <div style="display:flex; gap:10px; align-items:flex-end">
      <div style="flex:1">
        <label style="font-size:11px; font-weight:bold; color:var(--muted)">ADMIN PASSWORD</label>
        <input id="token" type="password" placeholder="Enter Admin Token">
      </div>
      <div style="flex:1">
        <label style="font-size:11px; font-weight:bold; color:var(--muted)">BRAND ID</label>
        <input id="brand" value="demo">
      </div>
      <button class="btn" style="background:var(--border)" onclick="load()">Connect & Sync</button>
    </div>
    <div id="identity" style="margin-top:10px; font-size:12px; font-weight:bold">Status: Ready</div>
  </div>

  <div id="dashboard" class="tab-content">
    <div class="card">
      <h3>System Overview</h3>
      <pre id="versions">History will appear here...</pre>
    </div>
  </div>

  <div id="rules" class="tab-content hidden">
    <div class="card">
      <h3>AI Behavioral Rules</h3>
      <p style="font-size:12px; color:var(--muted)">Example: "Always respond in English", "Be professional".</p>
      <textarea id="rulesBox" style="min-height:250px" placeholder="One rule per line..."></textarea>
      <div style="margin-top:10px; display:flex; gap:10px">
        <button class="btn save" onclick="save(false)">Save Draft</button>
        <button class="btn publish" onclick="save(true)">Publish to Live</button>
      </div>
    </div>
  </div>

  <div id="faq" class="tab-content hidden">
    <div style="display:flex; justify-content:space-between; align-items:center">
      <h3>FAQ Knowledge Base</h3>
      <button class="btn add" onclick="addFAQCard()">+ Add Card</button>
    </div>
    <div id="faqContainer" class="faq-grid"></div>
  </div>

  <div id="analytics" class="tab-content hidden">
    <div class="card"><h3>Analytics</h3><pre id="analyticsBox">{}</pre></div>
  </div>
  <div id="logs" class="tab-content hidden">
    <div class="card"><h3>Logs</h3><pre id="logsBox">No logs available.</pre></div>
  </div>
</main>

<script>
const API_BASE = "https://ai-chat-backend.marketing-696.workers.dev";
const $ = (id) => document.getElementById(id);

// --- FAQ UI 管理 ---
function addFAQCard(q = "", a = "", cat = "General") {
    const id = Date.now() + Math.random();
    const html = `
        <div class="faq-card" id="card-${id}">
            <button class="faq-delete" onclick="document.getElementById('card-${id}').remove()">×</button>
            <input class="faq-cat q-cat" value="${cat}" placeholder="Category">
            <div style="font-size:11px; color:var(--muted); margin-bottom:5px">USER TRIGGER:</div>
            <input class="q-val" value="${q}" placeholder="Question..." style="margin-bottom:10px">
            <div style="font-size:11px; color:var(--muted); margin-bottom:5px">AI RESPONSE:</div>
            <textarea class="a-val" style="min-height:80px; font-size:13px" placeholder="Answer...">${a}</textarea>
        </div>
    `;
    $("faqContainer").insertAdjacentHTML('beforeend', html);
}

// --- API 调用 ---
async function api(path, opts = {}) {
    const r = await fetch(`${API_BASE}${path}?brand=${encodeURIComponent($("brand").value)}`, {
        ...opts,
        headers: { "Content-Type": "application/json", "X-Admin-Token": $("token").value, ...opts.headers }
    });
    if (!r.ok) throw new Error(await r.text());
    return r.json();
}

async function load() {
    try {
        $("identity").textContent = "Syncing...";
        const data = await api("/api/admin/get");
        $("rulesBox").value = (data.draft?.rules || []).join("\n");
        $("faqContainer").innerHTML = "";
        (data.draft?.faq || []).forEach(f => addFAQCard(f.q, f.a, f.cat));

        const v = await api("/api/admin/versions");
        $("versions").textContent = v.versions.map(x => `${x.time} • ${x.id}`).join("\n");
        $("identity").textContent = "Connected ✅";
    } catch (e) { alert(e.message); $("identity").textContent = "Auth Failed ❌"; }
}

async function save(isPublish = false) {
    const rules = $("rulesBox").value.split("\n").filter(r => r.trim());
    const faq = Array.from(document.querySelectorAll(".faq-card")).map(c => ({
        q: c.querySelector(".q-val").value,
        a: c.querySelector(".a-val").value,
        cat: c.querySelector(".q-cat").value
    }));

    try {
        const path = isPublish ? "/api/admin/publish" : "/api/admin/save";
        await api(path, { method: "POST", body: JSON.stringify({ rules, faq }) });
        alert(isPublish ? "LIVE!" : "Draft Saved!");
        load();
    } catch (e) { alert(e.message); }
}

// 导航逻辑
document.querySelectorAll(".navbtn").forEach(btn => {
    btn.onclick = () => {
        document.querySelectorAll(".navbtn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        document.querySelectorAll(".tab-content").forEach(t => t.classList.add("hidden"));
        $(btn.dataset.tab).classList.remove("hidden");
    };
});
</script>
</body>
</html>
