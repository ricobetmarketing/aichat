<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>AI Support OS • Internal Console</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:system-ui;background:#f4f6fb}
.app{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
.sidebar{background:#0b1220;color:#fff;padding:20px}
.sidebar button{display:block;width:100%;padding:10px;margin-bottom:8px;border:0;border-radius:8px;background:#111827;color:#fff;cursor:pointer;text-align:left}
.sidebar button.active{background:#16a34a}
.main{padding:30px}
.card{background:#fff;border-radius:14px;padding:20px;margin-bottom:20px;box-shadow:0 10px 30px rgba(0,0,0,.08)}
textarea{width:100%;min-height:120px;padding:10px;border-radius:10px;border:1px solid #ddd}
.btn{padding:8px 14px;border-radius:8px;border:0;background:#16a34a;color:#fff;cursor:pointer;margin-right:10px}
.pill{padding:6px 12px;border-radius:999px;font-size:12px}
.ok{background:#dcfce7;color:#065f46}
.bad{background:#fee2e2;color:#7f1d1d}
</style>
</head>
<body>

<div class="app">
<div class="sidebar">
<h3>AI Support OS</h3>
<button data-tab="rules" class="active">Rules</button>
<button data-tab="faq">FAQ</button>
<button data-tab="test">Preview</button>
<button data-tab="analytics">Analytics</button>
</div>

<div class="main">
<div style="display:flex;justify-content:space-between;margin-bottom:20px">
<h2>Internal Admin Console</h2>
<div id="status" class="pill bad">Connecting...</div>
</div>

<section id="rules">
<div class="card">
<h3>System Rules (Draft)</h3>
<textarea id="rulesBox"></textarea><br><br>
<button class="btn" onclick="saveDraft()">Save Draft</button>
<button class="btn" onclick="publish()">Publish</button>
</div>
</section>

<section id="faq" style="display:none">
<div class="card">
<h3>FAQ JSON (Draft)</h3>
<textarea id="faqBox"></textarea><br><br>
<button class="btn" onclick="saveDraft()">Save Draft</button>
<button class="btn" onclick="publish()">Publish</button>
</div>
</section>

<section id="test" style="display:none">
<div class="card">
<h3>Preview Draft</h3>
<textarea id="testMsg"></textarea><br><br>
<button class="btn" onclick="runTest()">Run</button>
<div id="replyBox" style="margin-top:20px;font-weight:bold"></div>
</div>
</section>

<section id="analytics" style="display:none">
<div class="card">
<h3>Analytics</h3>
<canvas id="chart"></canvas>
</div>
</section>

</div>
</div>

<script>
// =============================
// FIXED INTERNAL CONFIG
// =============================
const API_BASE = "https://ai-chat-backend.marketing-696.workers.dev";
const BRAND = "demo";
const ADMIN_TOKEN = "YOUR_TOKEN_HERE"; // ← 改成你的真实 token

// =============================

const $ = id => document.getElementById(id)

function headers(){
return {
"Content-Type":"application/json",
"X-Admin-Token": ADMIN_TOKEN
}
}

async function connect(){
try{
const r = await fetch(API_BASE+"/admin/get?brand="+BRAND,{headers:headers()})
const data = await r.json()
$("rulesBox").value=(data.draft?.rules||[]).join("\n")
$("faqBox").value=JSON.stringify(data.draft?.faq||[],null,2)
$("status").className="pill ok"
$("status").innerText="Connected"
}catch{
$("status").className="pill bad"
$("status").innerText="Connection Failed"
}
}

async function saveDraft(){
const body={
rules:$("rulesBox").value.split("\n").filter(x=>x.trim()),
faq:JSON.parse($("faqBox").value||"[]")
}
await fetch(API_BASE+"/admin/save?brand="+BRAND,{
method:"POST",
headers:headers(),
body:JSON.stringify(body)
})
alert("Draft Saved")
}

async function publish(){
await fetch(API_BASE+"/admin/publish?brand="+BRAND,{
method:"POST",
headers:headers()
})
alert("Published to Live")
}

async function runTest(){
const r=await fetch(API_BASE+"/admin/test?brand="+BRAND,{
method:"POST",
headers:headers(),
body:JSON.stringify({message:$("testMsg").value,mode:"draft"})
})
const data=await r.json()
$("replyBox").innerText=data.reply||"No response"
}

// simple tab switch
document.querySelectorAll(".sidebar button").forEach(btn=>{
btn.onclick=()=>{
document.querySelectorAll(".sidebar button").forEach(b=>b.classList.remove("active"))
btn.classList.add("active")
document.querySelectorAll("section").forEach(s=>s.style.display="none")
document.getElementById(btn.dataset.tab).style.display="block"
}
})

connect()
</script>

</body>
</html>
