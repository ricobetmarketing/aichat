<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Support OS</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

.sidebar{
width:220px;
background:#0f172a;
color:white;
position:fixed;
top:0;
bottom:0;
padding:20px;
}

.sidebar h2{
margin-top:0;
}

.menu button{
width:100%;
padding:12px;
border:none;
background:#1e293b;
color:white;
margin-bottom:10px;
border-radius:6px;
cursor:pointer;
}

.menu button:hover{
background:#22c55e;
}

.main{
margin-left:240px;
padding:30px;
}

.card{
background:white;
padding:20px;
border-radius:8px;
margin-bottom:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

textarea{
width:100%;
height:180px;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

button.green{
background:#22c55e;
color:white;
border:none;
padding:10px 20px;
border-radius:6px;
cursor:pointer;
}

button.red{
background:#ef4444;
color:white;
border:none;
padding:10px 20px;
border-radius:6px;
cursor:pointer;
}

.stat{
display:inline-block;
background:white;
padding:20px;
margin-right:10px;
border-radius:6px;
min-width:120px;
}

pre{
background:#111;
color:#0f0;
padding:10px;
border-radius:6px;
max-height:300px;
overflow:auto;
}

</style>
</head>


<body>

<div class="sidebar">

<h2>AI Support OS</h2>

<div class="menu">

<button onclick="tab('dashboard')">Dashboard</button>
<button onclick="tab('rules')">Rules</button>
<button onclick="tab('faq')">FAQ</button>
<button onclick="tab('analytics')">Analytics</button>
<button onclick="tab('history')">History</button>
<button onclick="tab('logs')">Logs</button>

</div>

</div>


<div class="main">

<h1>Internal Admin</h1>

<div id="dashboard">

<div class="stat">
<h2 id="total">0</h2>
Messages
</div>

<div class="stat">
<h2 id="auto">0</h2>
Auto Replies
</div>

</div>


<div id="rules" style="display:none">

<div class="card">

<h3>Rules</h3>

<textarea id="rulesBox"></textarea>

<br><br>

<button class="green" onclick="save()">Save Draft</button>
<button class="red" onclick="publish()">Publish</button>

</div>

</div>


<div id="faq" style="display:none">

<div class="card">

<h3>FAQ</h3>

<textarea id="faqBox"></textarea>

<br><br>

<button class="green" onclick="save()">Save Draft</button>
<button class="red" onclick="publish()">Publish</button>

</div>

</div>


<div id="analytics" style="display:none">

<div class="card">

<h3>Analytics</h3>

<pre id="analyticsData"></pre>

</div>

</div>


<div id="history" style="display:none">

<div class="card">

<h3>Publish History</h3>

<pre id="versions"></pre>

</div>

</div>


<div id="logs" style="display:none">

<div class="card">

<h3>Logs</h3>

<pre id="logsData"></pre>

</div>

</div>

</div>


<script>

const API="https://ai-chat-backend.marketing-696.workers.dev";
const BRAND="demo";

function tab(name){

["dashboard","rules","faq","analytics","history","logs"].forEach(t=>{

document.getElementById(t).style.display="none";

});

document.getElementById(name).style.display="block";

}

async function load(){

const res=await fetch(API+"/admin/get?brand="+BRAND);
const data=await res.json();

const draft=data.draft||{};

document.getElementById("rulesBox").value=(draft.rules||[]).join("\n");

document.getElementById("faqBox").value=
JSON.stringify(draft.faq||[],null,2);

}

async function save(){

const rules=document.getElementById("rulesBox")
.value.split("\n");

const faq=JSON.parse(
document.getElementById("faqBox").value||"[]"
);

await fetch(API+"/admin/save?brand="+BRAND,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
rules,
faq
})

});

alert("Draft Saved");

}

async function publish(){

await fetch(API+"/admin/publish?brand="+BRAND);

alert("Knowledge Published");

loadHistory();

}

async function loadAnalytics(){

const res=await fetch(API+"/admin/analytics?brand="+BRAND);
const data=await res.json();

document.getElementById("analyticsData")
.innerText=JSON.stringify(data,null,2);

document.getElementById("total")
.innerText=data.metrics?.totalMessages||0;

document.getElementById("auto")
.innerText=data.metrics?.autoReply||0;

}

async function loadHistory(){

const res=await fetch(API+"/admin/versions?brand="+BRAND);
const data=await res.json();

document.getElementById("versions")
.innerText=JSON.stringify(data,null,2);

}

async function loadLogs(){

const res=await fetch(API+"/admin/logs?brand="+BRAND);
const data=await res.json();

document.getElementById("logsData")
.innerText=JSON.stringify(data,null,2);

}

load();
loadAnalytics();
loadHistory();
loadLogs();

</script>

</body>
</html>
