<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>AI Console • Smart Knowledge Base</title>

<style>
:root{--nav:#0f172a;--bg:#f1f5f9;--accent:#2563eb;--ok:#22c55e;--danger:#ef4444;--border:#e2e8f0;--card:#ffffff}
body{margin:0;font-family:'Segoe UI',system-ui;background:var(--bg);display:flex;height:100vh;overflow:hidden}

/* Sidebar */
aside{width:240px;background:var(--nav);color:#fff;display:flex;flex-direction:column;padding:20px}
.logo{font-weight:900;font-size:18px;color:var(--ok);margin-bottom:20px}
.nav-item{padding:12px;border-radius:10px;margin-bottom:6px;cursor:pointer;color:#94a3b8;display:flex;justify-content:space-between}
.nav-item.active,.nav-item:hover{background:var(--accent);color:#fff}

.badge{background:red;color:#fff;border-radius:10px;padding:2px 6px;font-size:10px}

/* Main */
main{flex:1;overflow:auto;padding:20px;display:flex;flex-direction:column;gap:20px}
.card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:20px}
textarea,input{width:100%;padding:10px;border:1px solid var(--border);border-radius:6px}

.btn{padding:10px 16px;border:0;border-radius:8px;font-weight:bold;cursor:pointer}
.btn-save{background:var(--ok);color:#fff}
.btn-pub{background:var(--danger);color:#fff}
.btn-primary{background:var(--accent);color:#fff}

.hidden{display:none}
.label-hint{font-size:10px;color:var(--accent);font-weight:bold}
.btn-group{margin-top:10px;display:flex;gap:10px}

/* Inbox */
.chat-box{border:1px solid var(--border);padding:10px;border-radius:10px;margin-bottom:10px;background:#f8fafc}
</style>
</head>

<body>

<aside>
<div class="logo">⚡ AI CONSOLE</div>

<div class="nav-item active" onclick="showTab('rules',this)">🤖 Behavior</div>
<div class="nav-item" onclick="showTab('faq',this)">📚 Knowledge Hub</div>
<div class="nav-item" onclick="showTab('persona',this)">🧠 Personas</div>
<div class="nav-item" onclick="showTab('buttons',this)">🔘 Buttons</div>

<div class="nav-item" onclick="showTab('inboxTelegram',this)">
📩 Telegram <span id="tgBadge" class="badge hidden">!</span>
</div>

<div class="nav-item" onclick="showTab('inboxWeb',this)">
💬 Live Chat <span id="webBadge" class="badge hidden">!</span>
</div>

</aside>

<main>

<div class="card">
<input id="token" placeholder="Admin Token">
<input id="brand" value="demo">
<button class="btn btn-primary" onclick="load()">Sync</button>
</div>

<!-- RULES -->
<div id="rules" class="tab-content">
<div class="card">
<h3>Agent Behavior</h3>
<textarea id="rulesBox" style="height:200px"></textarea>
<div class="btn-group">
<button class="btn btn-save" onclick="save(false)">Save</button>
<button class="btn btn-pub" onclick="save(true)">Publish</button>
</div>
</div>
</div>

<!-- KNOWLEDGE HUB -->
<div id="faq" class="tab-content hidden">
<div class="card">
<h3>Knowledge Hub</h3>
<div id="faqGrid"></div>
<button class="btn btn-primary" onclick="addFAQ()">+ Add Topic</button>
</div>
</div>

<!-- PERSONA -->
<div id="persona" class="tab-content hidden">
<div class="card">
<h3>AI Personas</h3>

<label class="label-hint">Telegram</label>
<textarea id="personaTelegram" style="height:150px"></textarea>

<label class="label-hint">Web Chat</label>
<textarea id="personaWeb" style="height:150px"></textarea>

<div class="btn-group">
<button class="btn btn-save" onclick="save(false)">Save</button>
<button class="btn btn-pub" onclick="save(true)">Publish</button>
</div>

</div>
</div>

<!-- BUTTONS -->
<div id="buttons" class="tab-content hidden">
<div class="card">
<h3>Telegram Buttons</h3>
<div id="btnList"></div>
<button class="btn btn-primary" onclick="addBtn()">+ Add</button>

<div class="btn-group">
<button class="btn btn-save" onclick="save(false)">Save</button>
<button class="btn btn-pub" onclick="save(true)">Publish</button>
</div>
</div>
</div>

<!-- TELEGRAM INBOX -->
<div id="inboxTelegram" class="tab-content hidden">
<div class="card">
<h3>Telegram Inbox</h3>
<div id="tgInbox"></div>
</div>
</div>

<!-- WEB INBOX -->
<div id="inboxWeb" class="tab-content hidden">
<div class="card">
<h3>Live Chat Inbox</h3>
<div id="webInbox"></div>
</div>
</div>

</main>

<script>

const API="https://ai-chat-backend.marketing-696.workers.dev";
const $=id=>document.getElementById(id);

function showTab(id,el){
document.querySelectorAll('.tab-content').forEach(t=>t.classList.add('hidden'));
document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
$(id).classList.remove('hidden');
el.classList.add('active');
}

// FAQ / Knowledge
function addFAQ(q="",a=""){
let d=document.createElement('div');
d.innerHTML=`<input class="q" placeholder="Topic Title" value="${q}">
<textarea class="a" placeholder="Full Knowledge Content">${a}</textarea>`;
$('faqGrid').appendChild(d);
}

// Buttons
function addBtn(text="",url=""){
let d=document.createElement('div');
d.innerHTML=`<input class="btnText" placeholder="Text" value="${text}">
<input class="btnUrl" placeholder="URL" value="${url}">`;
$('btnList').appendChild(d);
}

// LOAD
async function load(){
let r=await fetch(API+"/api/admin/get?brand="+$('brand').value,{
headers:{'X-Admin-Token':$('token').value}
});
let d=await r.json();

$('rulesBox').value=(d.draft.rules||[]).join("\n");

$('faqGrid').innerHTML="";
(d.draft.faq||[]).forEach(f=>addFAQ(f.q,f.a));

$('personaTelegram').value=d.draft.personaTelegram||"";
$('personaWeb').value=d.draft.personaWeb||"";

$('btnList').innerHTML="";
(d.draft.telegramButtons||[]).forEach(b=>addBtn(b.text,b.url));
}

// SAVE
async function save(pub){
let body={
rules:$('rulesBox').value.split("\n"),
faq:[...document.querySelectorAll('#faqGrid div')].map(x=>({
q:x.querySelector('.q').value,
a:x.querySelector('.a').value
})),
personaTelegram:$('personaTelegram').value,
personaWeb:$('personaWeb').value,
telegramButtons:[...document.querySelectorAll('#btnList div')].map(x=>({
text:x.querySelector('.btnText').value,
url:x.querySelector('.btnUrl').value
}))
};

await fetch(API+(pub?"/api/admin/publish":"/api/admin/save")+"?brand="+$('brand').value,{
method:"POST",
headers:{'Content-Type':'application/json','X-Admin-Token':$('token').value},
body:JSON.stringify(body)
});

alert("Saved");
}

// ================= INBOX SIMULATION =================

// (Later connect Worker logs / DB)
let tgCount=0, webCount=0;

function fakeIncoming(){
tgCount++;
webCount++;

$('tgBadge').classList.remove('hidden');
$('webBadge').classList.remove('hidden');

$('tgInbox').innerHTML+=`<div class="chat-box">User: deposit failed<br>AI: checking...</div>`;
$('webInbox').innerHTML+=`<div class="chat-box">User: bonus issue<br>AI: reply...</div>`;
}

setInterval(fakeIncoming,10000);

</script>

</body>
</html>
