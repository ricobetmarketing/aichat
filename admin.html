<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Support OS - Admin</title>

<style>

body{
margin:0;
font-family:system-ui;
background:#f3f4f6;
display:flex;
}

.sidebar{
width:220px;
background:#0f172a;
color:white;
height:100vh;
padding:20px;
}

.sidebar h2{
margin-top:0;
font-size:20px;
}

.menu button{
display:block;
width:100%;
margin:8px 0;
padding:10px;
border:0;
border-radius:6px;
background:#1e293b;
color:white;
cursor:pointer;
}

.menu button.active{
background:#22c55e;
}

.main{
flex:1;
padding:30px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 5px 20px rgba(0,0,0,.05);
}

textarea{
width:100%;
height:180px;
}

input{
padding:8px;
width:200px;
}

button.action{
padding:10px 14px;
margin-top:10px;
margin-right:10px;
border:0;
border-radius:6px;
cursor:pointer;
}

.save{background:#16a34a;color:white}
.publish{background:#dc2626;color:white}
.reload{background:#64748b;color:white}

pre{
background:#111827;
color:#e5e7eb;
padding:10px;
border-radius:6px;
max-height:200px;
overflow:auto;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<div class="sidebar">

<h2>AI Support OS</h2>

<div class="menu">

<button onclick="show('dashboard')" class="active">Dashboard</button>
<button onclick="show('rules')">Rules</button>
<button onclick="show('faq')">FAQ</button>
<button onclick="show('analytics')">Analytics</button>
<button onclick="show('history')">History</button>
<button onclick="show('logs')">Logs</button>

</div>

</div>


<div class="main">

<h1>Internal Admin</h1>


<div class="card">

Brand
<input id="brand" value="demo">

Admin Token
<input id="token" type="password">

<button class="action save" onclick="connect()">Connect</button>

</div>



<div id="dashboard" class="card">

<h3>Publish History</h3>

<pre id="versions">No versions yet</pre>

</div>



<div id="rules" class="card hidden">

<h3>Rules (one per line)</h3>

<textarea id="rulesBox"></textarea>

<button class="action save" onclick="saveDraft()">Save Draft</button>
<button class="action publish" onclick="publish()">Publish</button>
<button class="action reload" onclick="loadData()">Reload</button>

</div>



<div id="faq" class="card hidden">

<h3>FAQ JSON</h3>

<textarea id="faqBox"></textarea>

</div>



<div id="logs" class="card hidden">

<h3>Logs</h3>

<pre id="logsBox"></pre>

</div>



<div id="history" class="card hidden">

<h3>Knowledge Versions</h3>

<pre id="historyBox"></pre>

</div>



<div id="analytics" class="card hidden">

<h3>Analytics</h3>

<pre id="analyticsBox"></pre>

</div>



</div>



<script>

const API="https://ai-chat-backend.marketing-696.workers.dev"



function show(id){

document.querySelectorAll(".card").forEach(x=>x.classList.add("hidden"))

document.getElementById(id).classList.remove("hidden")

}



function headers(){

return{
"Content-Type":"application/json",
"X-Admin-Token":document.getElementById("token").value
}

}



function brand(){

return document.getElementById("brand").value

}



async function connect(){

await loadData()

await loadLogs()

await loadVersions()

await loadAnalytics()

}



async function loadData(){

const r=await fetch(API+"/api/admin/get?brand="+brand(),{headers:headers()})

const data=await r.json()

document.getElementById("rulesBox").value=(data.draft.rules||[]).join("\n")

document.getElementById("faqBox").value=JSON.stringify(data.draft.faq||[],null,2)

}



async function saveDraft(){

const rules=document.getElementById("rulesBox").value.split("\n")

const faq=JSON.parse(document.getElementById("faqBox").value||"[]")

await fetch(API+"/api/admin/save?brand="+brand(),{

method:"POST",

headers:headers(),

body:JSON.stringify({rules,faq})

})

alert("Draft Saved")

}



async function publish(){

await fetch(API+"/api/admin/publish?brand="+brand(),{

method:"POST",

headers:headers()

})

alert("Published")

loadVersions()

}



async function loadLogs(){

const r=await fetch(API+"/api/admin/logs?brand="+brand(),{headers:headers()})

const data=await r.json()

document.getElementById("logsBox").innerText=data.logs.map(x=>x.time+" • "+x.action).join("\n")

}



async function loadVersions(){

const r=await fetch(API+"/api/admin/versions?brand="+brand(),{headers:headers()})

const data=await r.json()

document.getElementById("versions").innerText=data.versions.map(v=>v.time+" • "+v.id).join("\n")

document.getElementById("historyBox").innerText=document.getElementById("versions").innerText

}



async function loadAnalytics(){

const r=await fetch(API+"/api/admin/analytics?brand="+brand(),{headers:headers()})

const data=await r.json()

document.getElementById("analyticsBox").innerText=JSON.stringify(data.metrics,null,2)

}



</script>

</body>
</html>
