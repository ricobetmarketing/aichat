<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>AI Console • Knowledge Management</title>
<style>
:root{--nav:#0f172a;--bg:#f1f5f9;--accent:#2563eb;--ok:#22c55e;--danger:#ef4444;--border:#e2e8f0;--card:#ffffff}
body{margin:0;font-family:'Segoe UI',system-ui;background:var(--bg);display:flex;height:100vh;overflow:hidden}
/* Sidebar */
aside{width:240px;background:var(--nav);color:#fff;display:flex;flex-direction:column;padding:20px 15px;box-shadow:2px 0 10px rgba(0,0,0,0.1)}
.logo{font-weight:900; font-size:18px; color:var(--ok); margin-bottom:30px; padding:0 10px}
.nav-item{padding:12px 15px;cursor:pointer;border-radius:10px;margin-bottom:8px;font-size:14px;color:#94a3b8;transition:0.3s;display:flex;align-items:center}
.nav-item:hover{background:rgba(255,255,255,0.05);color:#fff}
.nav-item.active{background:var(--accent);color:#fff;box-shadow:0 4px 12px rgba(37,99,235,0.3)}
/* Main */
main{flex:1;overflow-y:auto;padding:30px;display:flex;flex-direction:column;gap:20px}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;box-shadow:0 4px 6px -1px rgba(0,0,0,0.05)}
.faq-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(320px, 1fr));gap:20px}
.faq-card{background:#fff;border:2px solid var(--border);border-radius:12px;padding:18px;position:relative;transition:0.2s}
.faq-card:hover{border-color:var(--accent); transform:translateY(-2px)}
.faq-delete{position:absolute;top:10px;right:10px;background:#fee2e2;border:0;color:var(--danger);width:24px;height:24px;border-radius:6px;cursor:pointer;font-weight:bold}
/* Inputs */
input,textarea{width:100%;padding:12px;border:2px solid var(--border);border-radius:10px;margin-top:8px;font-size:14px;outline:none;transition:0.2s}
input:focus,textarea:focus{border-color:var(--accent)}
/* Buttons */
.btn-group{display:flex; gap:10px; margin-top:20px}
.btn{padding:12px 24px;border-radius:10px;border:0;cursor:pointer;font-weight:700;font-size:14px;transition:0.2s;display:inline-flex;align-items:center;gap:8px}
.btn:active{transform:scale(0.98)}
.btn-primary{background:var(--accent);color:#fff}
.btn-save{background:var(--ok);color:#fff}
.btn-pub{background:var(--danger);color:#fff}
.hidden{display:none}
</style>
</head>
<body>

<aside>
  <div class="logo">⚡ AI CONSOLE</div>
  <div class="nav-item active" onclick="showTab('rules', this)">🤖 AI Behavior</div>
  <div class="nav-item" onclick="showTab('faq', this)">📚 FAQ Library</div>
  <div class="nav-item" onclick="showTab('logs', this)">📜 Logs</div>
  <div style="margin-top:auto; padding:10px"><a href="index.html" style="color:#94a3b8; text-decoration:none; font-size:12px">← Open Chat UI</a></div>
</aside>

<main>
  <div class="card" style="background: #f8fafc; border-style: dashed;">
    <div style="display:flex; gap:15px; align-items:flex-end">
      <div style="flex:1">
        <label style="font-size:11px; font-weight:bold; color:#64748b">ADMIN TOKEN (PASSWORD)</label>
        <input id="token" type="password" placeholder="Enter Secret Key">
      </div>
      <div style="flex:1">
        <label style="font-size:11px; font-weight:bold; color:#64748b">BRAND ID</label>
        <input id="brand" value="demo">
      </div>
      <button class="btn btn-primary" onclick="load()">🔄 Sync & Load</button>
    </div>
    <div id="status" style="font-size:12px; margin-top:12px; font-weight:bold; color:#64748b">Status: Ready</div>
  </div>

  <div id="rules" class="tab-content">
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px">
        <h3 style="margin:0">AI System Prompt</h3>
        <span style="font-size:12px; color:#64748b">Define how the AI talks</span>
      </div>
      <textarea id="rulesBox" style="height:350px" placeholder="Example:
- You are a helpful customer support agent.
- Be polite and concise.
- If you don't know the answer, ask for human help."></textarea>
      <div class="btn-group">
        <button class="btn btn-save" onclick="save(false)">💾 Save Draft</button>
        <button class="btn btn-pub" onclick="save(true)">🚀 Publish Live</button>
      </div>
    </div>
  </div>

  <div id="faq" class="tab-content hidden">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
      <h3 style="margin:0">Knowledge Cards</h3>
      <button class="btn btn-primary" onclick="addFAQ()">+ Add FAQ Card</button>
    </div>
    <div id="faqGrid" class="faq-grid">
      </div>
    <div class="btn-group" style="margin-top:30px; border-top:1px solid var(--border); padding-top:20px">
        <button class="btn btn-save" onclick="save(false)">💾 Save All FAQs</button>
        <button class="btn btn-pub" onclick="save(true)">🚀 Publish to Chat UI</button>
    </div>
  </div>

  <div id="logs" class="tab-content hidden">
    <div class="card">
      <h3>System Activity</h3>
      <pre id="logsBox" style="font-family:monospace; font-size:12px; background:#0f172a; color:#86efac; padding:20px; border-radius:10px; overflow-x:auto">No activity logs recorded.</pre>
    </div>
  </div>
</main>

<script>
const API = "https://ai-chat-backend.marketing-696.workers.dev";
const $ = (id) => document.getElementById(id);

function showTab(tabId, el) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    $(tabId).classList.remove('hidden');
    el.classList.add('active');
}

// 动态添加 FAQ 卡片逻辑
function addFAQ(q="", a="") {
    const id = "faq-" + Date.now() + Math.random().toString(36).substr(2, 5);
    const div = document.createElement('div');
    div.className = 'faq-card';
    div.id = id;
    div.innerHTML = `
        <button class="faq-delete" onclick="document.getElementById('${id}').remove()">✕</button>
        <div style="font-size:11px; font-weight:800; color:var(--accent)">QUESTION / TRIGGER</div>
        <input class="q-val" value="${q}" placeholder="What user asks...">
        <div style="font-size:11px; font-weight:800; color:var(--ok); margin-top:15px">AI RESPONSE</div>
        <textarea class="a-val" style="height:80px" placeholder="What AI answers...">${a}</textarea>
    `;
    $('faqGrid').appendChild(div);
}

// 核心：加载数据
async function load() {
    const brand = $('brand').value;
    const token = $('token').value;
    if(!token) return alert("Please enter Admin Token!");
    
    $('status').innerText = "📡 Syncing with KV database...";
    try {
        const r = await fetch(`${API}/api/admin/get?brand=${brand}`, {
            headers: { "X-Admin-Token": token }
        });
        if(!r.ok) throw new Error("Auth failed");
        
        const data = await r.json();
        
        // 渲染 Behavior
        $('rulesBox').value = (data.draft?.rules || []).join('\n');
        
        // 渲染 FAQ 卡片
        $('faqGrid').innerHTML = "";
        const faqs = data.draft?.faq || [];
        if(faqs.length === 0) {
            $('status').innerText = "Connected. Library is empty.";
        } else {
            faqs.forEach(f => addFAQ(f.q, f.a));
            $('status').innerText = "Connected ✅ Loaded " + faqs.length + " cards.";
        }
    } catch(e) { 
        $('status').innerText = "Failed ❌ " + e.message;
        alert("Sync Failed: Check your Token and Worker status.");
    }
}

// 核心：保存与发布
async function save(isPub) {
    const brand = $('brand').value;
    const token = $('token').value;
    
    if(!token) return alert("Enter Token to save!");

    // 1. 自动收集所有卡片数据
    const rules = $('rulesBox').value.split('\n').filter(r => r.trim());
    const faq = Array.from(document.querySelectorAll('.faq-card')).map(c => ({
        q: c.querySelector('.q-val').value.trim(),
        a: c.querySelector('.a-val').value.trim()
    })).filter(f => f.q && f.a); // 过滤掉空的卡片

    const path = isPub ? "/api/admin/publish" : "/api/admin/save";
    
    $('status').innerText = isPub ? "🚀 Publishing..." : "💾 Saving Draft...";

    try {
        const r = await fetch(`${API}${path}?brand=${brand}`, {
            method: 'POST',
            headers: { 
                "Content-Type": "application/json", 
                "X-Admin-Token": token 
            },
            body: JSON.stringify({ rules, faq })
        });

        if(!r.ok) throw new Error("Server rejected save");

        alert(isPub ? "🎉 SUCCESS! Changes are now LIVE in Chat UI." : "💾 Draft saved to database.");
        load(); // 保存后重新刷新一次数据，确保同步
    } catch(e) { 
        alert("Error: " + e.message); 
        $('status').innerText = "Error Saving ❌";
    }
}
</script>
</body>
</html>
