<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>AI Console • Smart Knowledge Base</title>
<style>
:root{--nav:#0f172a;--bg:#f1f5f9;--accent:#2563eb;--ok:#22c55e;--danger:#ef4444;--border:#e2e8f0;--card:#ffffff}
body{margin:0;font-family:'Segoe UI',system-ui;background:var(--bg);display:flex;height:100vh;overflow:hidden}
/* Sidebar */
aside{width:240px;background:var(--nav);color:#fff;display:flex;flex-direction:column;padding:20px 15px;box-shadow:2px 0 10px rgba(0,0,0,0.1)}
.logo{font-weight:900; font-size:18px; color:var(--ok); margin-bottom:30px; padding:0 10px}
.nav-item{padding:12px 15px;cursor:pointer;border-radius:10px;margin-bottom:8px;font-size:14px;color:#94a3b8;transition:0.3s;display:flex;align-items:center}
.nav-item:hover{background:rgba(255,255,255,0.05);color:#fff}
.nav-item.active{background:var(--accent);color:#fff;box-shadow:0 4px 12px rgba(37,99,235,0.3)}
/* Main */
main{flex:1;overflow-y:auto;padding:30px;display:flex;flex-direction:column;gap:20px}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;box-shadow:0 4px 6px -1px rgba(0,0,0,0.05)}
.faq-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(350px, 1fr));gap:20px}
.faq-card{background:#fff;border:2px solid var(--border);border-radius:12px;padding:18px;position:relative;transition:0.2s;display:flex;flex-direction:column;gap:10px}
.faq-card:hover{border-color:var(--accent); transform:translateY(-2px)}
.faq-delete{position:absolute;top:10px;right:10px;background:#fee2e2;border:0;color:var(--danger);width:24px;height:24px;border-radius:6px;cursor:pointer;font-weight:bold}
/* Inputs */
input,textarea,select{width:100%;padding:10px;border:2px solid var(--border);border-radius:8px;font-size:14px;outline:none}
input:focus,textarea:focus{border-color:var(--accent)}
.label-hint{font-size:10px; font-weight:bold; color:var(--accent); text-transform:uppercase}
/* Buttons */
.btn-group{display:flex; gap:10px; margin-top:20px}
.btn{padding:12px 24px;border-radius:10px;border:0;cursor:pointer;font-weight:700;font-size:14px;transition:0.2s;display:inline-flex;align-items:center;gap:8px}
.btn-primary{background:var(--accent);color:#fff}
.btn-save{background:var(--ok);color:#fff}
.btn-pub{background:var(--danger);color:#fff}
.hidden{display:none}
</style>
</head>
<body>

<aside>
  <div class="logo">⚡ AI CONSOLE</div>
  <div class="nav-item active" onclick="showTab('rules', this)">🤖 Agent Behavior</div>
  <div class="nav-item" onclick="showTab('faq', this)">📚 FAQ Library</div>
  <div class="nav-item" onclick="showTab('logs', this)">📜 System Logs</div>
  <div style="margin-top:auto; padding:10px"><a href="index.html" style="color:#94a3b8; text-decoration:none; font-size:12px">← View Live Chat</a></div>
</aside>

<main>
  <div class="card" style="background: #f8fafc; border-style: dashed;">
    <div style="display:flex; gap:15px; align-items:flex-end">
      <div style="flex:1">
        <label style="font-size:11px; font-weight:bold; color:#64748b">ADMIN TOKEN</label>
        <input id="token" type="password" placeholder="Enter Password">
      </div>
      <div style="flex:1">
        <label style="font-size:11px; font-weight:bold; color:#64748b">BRAND ID</label>
        <input id="brand" value="demo">
      </div>
      <button class="btn btn-primary" onclick="load()">🔄 Sync Data</button>
    </div>
    <div id="status" style="font-size:12px; margin-top:12px; font-weight:bold; color:#64748b">Status: Ready</div>
  </div>

  <div id="rules" class="tab-content">
    <div class="card">
      <h3>轉接人工流程设置 (Escalation Setup)</h3>
      <p style="font-size:13px; color:#64748b">When the AI cannot answer, it will use these rules to transfer to a human.</p>
      <textarea id="rulesBox" style="height:300px" placeholder="Write instructions for the transition here..."></textarea>
      <div class="btn-group">
        <button class="btn btn-save" onclick="save(false)">💾 Save Draft</button>
        <button class="btn btn-pub" onclick="save(true)">🚀 Publish Live</button>
      </div>
    </div>
  </div>

  <div id="faq" class="tab-content hidden">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
      <h3>Knowledge Library (Categorized)</h3>
      <button class="btn btn-primary" onclick="addFAQ()">+ Add New Topic</button>
    </div>
    <div id="faqGrid" class="faq-grid"></div>
    <div class="btn-group" style="margin-top:30px; border-top:1px solid var(--border); padding-top:20px">
        <button class="btn btn-save" onclick="save(false)">💾 Save All</button>
        <button class="btn btn-pub" onclick="save(true)">🚀 Publish All to Chat</button>
    </div>
  </div>

  <div id="logs" class="tab-content hidden">
    <div class="card">
      <h3>System Activity</h3>
      <pre id="logsBox" style="font-family:monospace; font-size:12px; background:#0f172a; color:#86efac; padding:20px; border-radius:10px">Waiting for sync...</pre>
    </div>
  </div>
</main>

<script>
const API = "https://ai-chat-backend.marketing-696.workers.dev";
const $ = (id) => document.getElementById(id);

function showTab(tabId, el) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    $(tabId).classList.remove('hidden');
    el.classList.add('active');
}

function addFAQ(cat="Deposit", q="", a="") {
    const id = "faq-" + Date.now() + Math.random().toString(36).substr(2, 5);
    const div = document.createElement('div');
    div.className = 'faq-card';
    div.id = id;
    div.innerHTML = `
        <button class="faq-delete" onclick="document.getElementById('${id}').remove()">✕</button>
        
        <label class="label-hint">Main Title / Category</label>
        <input class="cat-val" value="${cat}" placeholder="e.g. Deposit">
        
        <label class="label-hint">Sub-titles / Keywords (Separated by comma)</label>
        <input class="q-val" value="${q}" placeholder="e.g. USDT, Bank Transfer, How to pay">
        
        <label class="label-hint">Final Answer</label>
        <textarea class="a-val" style="height:100px" placeholder="The exact answer to show...">${a}</textarea>
    `;
    $('faqGrid').appendChild(div);
}

async function load() {
    const brand = $('brand').value;
    const token = $('token').value;
    if(!token) return alert("Please enter Token!");
    $('status').innerText = "📡 Loading...";
    try {
        const r = await fetch(`${API}/api/admin/get?brand=${brand}`, { headers: { "X-Admin-Token": token } });
        const data = await r.json();
        $('rulesBox').value = (data.draft?.rules || []).join('\n');
        $('faqGrid').innerHTML = "";
        (data.draft?.faq || []).forEach(f => addFAQ(f.cat || "General", f.q, f.a));
        $('status').innerText = "Connected ✅ Loaded " + (data.draft?.faq || []).length + " topics.";
    } catch(e) { $('status').innerText = "Failed ❌"; }
}

async function save(isPub) {
    const token = $('token').value;
    const rules = $('rulesBox').value.split('\n').filter(r => r.trim());
    const faq = Array.from(document.querySelectorAll('.faq-card')).map(c => ({
        cat: c.querySelector('.cat-val').value.trim(),
        q: c.querySelector('.q-val').value.trim(),
        a: c.querySelector('.a-val').value.trim()
    })).filter(f => f.q && f.a);

    const path = isPub ? "/api/admin/publish" : "/api/admin/save";
    try {
        await fetch(`${API}${path}?brand=${$('brand').value}`, {
            method: 'POST',
            headers: { "Content-Type": "application/json", "X-Admin-Token": token },
            body: JSON.stringify({ rules, faq })
        });
        alert(isPub ? "🚀 Live Update Successful!" : "💾 Draft Saved!");
        load();
    } catch(e) { alert("Error saving data"); }
}
</script>
</body>
</html>
