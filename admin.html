<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>AI Console</title>

<style>
:root{
--nav:#0f172a;
--bg:#f1f5f9;
--card:#ffffff;
--accent:#2563eb;
--ok:#22c55e;
--danger:#ef4444;
--border:#e2e8f0;
}

body{
margin:0;
font-family:system-ui;
background:var(--bg);
display:flex;
height:100vh;
}

/* SIDEBAR */
aside{
width:240px;
background:var(--nav);
color:#fff;
padding:20px;
display:flex;
flex-direction:column;
}

.nav-item{
padding:12px;
border-radius:10px;
margin-bottom:8px;
cursor:pointer;
color:#cbd5f5;
}
.nav-item.active{
background:var(--accent);
color:#fff;
}

/* MAIN */
main{
flex:1;
padding:20px;
overflow:auto;
}

.card{
background:#fff;
border:1px solid var(--border);
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

input,textarea{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid var(--border);
margin-top:5px;
margin-bottom:10px;
}

button{
padding:10px 14px;
border:none;
border-radius:8px;
cursor:pointer;
}

.btn-primary{background:var(--accent);color:#fff}
.btn-save{background:var(--ok);color:#fff}
.btn-pub{background:var(--danger);color:#fff}

/* KNOWLEDGE */
.topic{
border:1px solid var(--border);
padding:12px;
border-radius:10px;
margin-bottom:10px;
cursor:pointer;
background:#fff;
}
.topic:hover{background:#f8fafc}

.topic-detail{
display:none;
margin-top:10px;
padding:10px;
background:#f1f5f9;
border-radius:8px;
}

/* CRM */
.chat{
border:1px solid var(--border);
height:350px;
overflow:auto;
padding:10px;
background:#f8fafc;
border-radius:10px;
}

.msg{margin:6px 0}
.user{color:#000}
.ai{color:#2563eb}
.agent{color:#16a34a}

.hidden{display:none}
</style>
</head>

<body>

<aside>
<div class="nav-item active" onclick="switchTab('behavior',this)">🤖 Behavior</div>
<div class="nav-item" onclick="switchTab('knowledge',this)">📚 Knowledge</div>
<div class="nav-item" onclick="switchTab('persona',this)">🧠 Personas</div>
<div class="nav-item" onclick="switchTab('buttons',this)">🔘 Buttons</div>
<div class="nav-item" onclick="switchTab('crm',this)">📩 Telegram CRM</div>
</aside>

<main>

<div class="card">
<input id="token" placeholder="Admin Token">
<input id="brand" value="demo">
<button class="btn-primary" onclick="load()">Sync</button>
</div>

<!-- BEHAVIOR -->
<div id="behavior" class="tab">
<div class="card">
<h3>Agent Behavior</h3>
<textarea id="rules" style="height:200px"></textarea>
<button class="btn-save" onclick="save(false)">Save</button>
<button class="btn-pub" onclick="save(true)">Publish</button>
</div>
</div>

<!-- KNOWLEDGE -->
<div id="knowledge" class="tab hidden">
<div class="card">
<h3>Knowledge Hub</h3>
<div id="topics"></div>
<button class="btn-primary" onclick="addTopic()">+ Add Topic</button>
</div>
</div>

<!-- PERSONA -->
<div id="persona" class="tab hidden">
<div class="card">
<h3>Personas</h3>

<label>Telegram</label>
<textarea id="personaTelegram"></textarea>

<label>Web</label>
<textarea id="personaWeb"></textarea>

<button class="btn-save" onclick="save(false)">Save</button>
<button class="btn-pub" onclick="save(true)">Publish</button>
</div>
</div>

<!-- BUTTONS -->
<div id="buttons" class="tab hidden">
<div class="card">
<h3>Telegram Buttons</h3>
<div id="btnList"></div>
<button class="btn-primary" onclick="addBtn()">+ Add</button>
</div>
</div>

<!-- CRM -->
<div id="crm" class="tab hidden">
<div class="card">
<h3>Telegram CRM</h3>

<div id="chatList"></div>

<div class="chat" id="chatBox"></div>

<textarea id="replyBox"></textarea>
<button class="btn-primary" onclick="sendReply()">Send Reply</button>

</div>
</div>

</main>

<script>
const API="https://ai-chat-backend.marketing-696.workers.dev";

function switchTab(id,el){
document.querySelectorAll(".tab").forEach(t=>t.classList.add("hidden"));
document.querySelectorAll(".nav-item").forEach(n=>n.classList.remove("active"));

document.getElementById(id).classList.remove("hidden");
el.classList.add("active");
}

/* KNOWLEDGE */
function addTopic(q="",a=""){
let div=document.createElement("div");
div.className="topic";

div.innerHTML=`
<b contenteditable>${q||"New Topic"}</b>
<div class="topic-detail" contenteditable>${a||"Full content..."}</div>
`;

div.onclick=()=>{
let d=div.querySelector(".topic-detail");
d.style.display=d.style.display==="block"?"none":"block";
};

document.getElementById("topics").appendChild(div);
}

/* BUTTONS */
function addBtn(text="",url=""){
let div=document.createElement("div");
div.innerHTML=`
<input class="btext" placeholder="Text" value="${text}">
<input class="burl" placeholder="URL" value="${url}">
`;
document.getElementById("btnList").appendChild(div);
}

/* LOAD */
async function load(){
try{
let r=await fetch(API+"/api/admin/get?brand="+document.getElementById("brand").value,{
headers:{'X-Admin-Token':document.getElementById("token").value}
});

let d=await r.json();

document.getElementById("rules").value=(d.draft.rules||[]).join("\n");

document.getElementById("topics").innerHTML="";
(d.draft.faq||[]).forEach(f=>addTopic(f.q,f.a));

document.getElementById("personaTelegram").value=d.draft.personaTelegram||"";
document.getElementById("personaWeb").value=d.draft.personaWeb||"";

document.getElementById("btnList").innerHTML="";
(d.draft.telegramButtons||[]).forEach(b=>addBtn(b.text,b.url));

}catch(e){
alert("Load failed: "+e.message);
}
}

/* SAVE */
async function save(pub){

let topics=[...document.querySelectorAll(".topic")].map(t=>({
q:t.querySelector("b").innerText,
a:t.querySelector(".topic-detail").innerText
}));

await fetch(API+(pub?"/api/admin/publish":"/api/admin/save")+"?brand="+document.getElementById("brand").value,{
method:"POST",
headers:{
"Content-Type":"application/json",
"X-Admin-Token":document.getElementById("token").value
},
body:JSON.stringify({
rules:document.getElementById("rules").value.split("\n"),
faq:topics,
personaTelegram:document.getElementById("personaTelegram").value,
personaWeb:document.getElementById("personaWeb").value,
telegramButtons:[...document.querySelectorAll("#btnList div")].map(x=>({
text:x.querySelector(".btext").value,
url:x.querySelector(".burl").value
}))
})
});

alert("Saved");
}

/* CRM */
let currentChat=null;

async function loadCRM(){
let r=await fetch(API+"/api/admin/inbox");
let data=await r.json();

let chats={};
data.forEach(m=>{
if(!chats[m.chatId]) chats[m.chatId]=[];
chats[m.chatId].push(m);
});

let list=document.getElementById("chatList");
list.innerHTML="";

Object.keys(chats).forEach(id=>{
let div=document.createElement("div");
div.innerText="Chat "+id;
div.style.cursor="pointer";
div.onclick=()=>openChat(id,chats[id]);
list.appendChild(div);
});
}

function openChat(id,msgs){
currentChat=id;
let box=document.getElementById("chatBox");
box.innerHTML="";

msgs.forEach(m=>{
box.innerHTML+=`<div class="msg ${m.type}">${m.type}: ${m.text}</div>`;
});
}

async function sendReply(){
let msg=document.getElementById("replyBox").value;

await fetch(API+"/api/admin/reply",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
chatId:currentChat,
message:msg
})
});

loadCRM();
}

setInterval(loadCRM,3000);
</script>

</body>
</html>
