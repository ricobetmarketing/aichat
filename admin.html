<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>AI Console • Smart Knowledge Base</title>

<style>
:root{--nav:#0f172a;--bg:#f1f5f9;--accent:#2563eb;--ok:#22c55e;--danger:#ef4444;--border:#e2e8f0;--card:#ffffff}
body{margin:0;font-family:'Segoe UI',system-ui;background:var(--bg);display:flex;height:100vh;overflow:hidden}
aside{width:240px;background:var(--nav);color:#fff;display:flex;flex-direction:column;padding:20px 15px}
.logo{font-weight:900;font-size:18px;color:var(--ok);margin-bottom:30px}
.nav-item{padding:12px;cursor:pointer;border-radius:10px;margin-bottom:8px;color:#94a3b8}
.nav-item.active,.nav-item:hover{background:var(--accent);color:#fff}
main{flex:1;overflow-y:auto;padding:30px;display:flex;flex-direction:column;gap:20px}
.card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:24px}
textarea,input{width:100%;padding:10px;border:2px solid var(--border);border-radius:8px}
.btn{padding:10px 20px;border-radius:8px;border:0;cursor:pointer;font-weight:bold}
.btn-save{background:var(--ok);color:#fff}
.btn-pub{background:var(--danger);color:#fff}
.btn-primary{background:var(--accent);color:#fff}
.hidden{display:none}
.label-hint{font-size:10px;color:var(--accent);font-weight:bold}
.btn-group{margin-top:15px;display:flex;gap:10px}
</style>
</head>

<body>

<aside>
<div class="logo">⚡ AI CONSOLE</div>
<div class="nav-item active" onclick="showTab('rules',this)">🤖 Agent Behavior</div>
<div class="nav-item" onclick="showTab('faq',this)">📚 FAQ</div>
<div class="nav-item" onclick="showTab('persona',this)">🧠 Personas</div>
<div class="nav-item" onclick="showTab('buttons',this)">🔘 Telegram Buttons</div>
</aside>

<main>

<div class="card">
<input id="token" placeholder="Admin Token">
<input id="brand" value="demo">
<button class="btn btn-primary" onclick="load()">Sync</button>
</div>

<!-- RULES -->
<div id="rules" class="tab-content">
<div class="card">
<h3>Agent Behavior</h3>
<textarea id="rulesBox" style="height:200px"></textarea>
<div class="btn-group">
<button class="btn btn-save" onclick="save(false)">Save</button>
<button class="btn btn-pub" onclick="save(true)">Publish</button>
</div>
</div>
</div>

<!-- FAQ -->
<div id="faq" class="tab-content hidden">
<div class="card">
<h3>FAQ</h3>
<div id="faqGrid"></div>
<button class="btn btn-primary" onclick="addFAQ()">+ Add</button>
</div>
</div>

<!-- PERSONA -->
<div id="persona" class="tab-content hidden">
<div class="card">
<h3>AI Personas</h3>

<label class="label-hint">Telegram Persona</label>
<textarea id="personaTelegram" style="height:180px"></textarea>

<label class="label-hint">Web Persona</label>
<textarea id="personaWeb" style="height:180px"></textarea>

<div class="btn-group">
<button class="btn btn-save" onclick="savePersona(false)">Save</button>
<button class="btn btn-pub" onclick="savePersona(true)">Publish</button>
</div>

</div>
</div>

<!-- TELEGRAM BUTTONS -->
<div id="buttons" class="tab-content hidden">
<div class="card">
<h3>Telegram Buttons</h3>

<div id="btnList"></div>

<button class="btn btn-primary" onclick="addBtn()">+ Add Button</button>

<div class="btn-group">
<button class="btn btn-save" onclick="saveButtons(false)">Save</button>
<button class="btn btn-pub" onclick="saveButtons(true)">Publish</button>
</div>

</div>
</div>

</main>

<script>

const API = "https://ai-chat-backend.marketing-696.workers.dev";
const $ = id=>document.getElementById(id);

function showTab(id,el){
document.querySelectorAll('.tab-content').forEach(t=>t.classList.add('hidden'));
document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
$(id).classList.remove('hidden');
el.classList.add('active');
}

function addFAQ(q="",a=""){
let d=document.createElement('div');
d.innerHTML=`<input class="q" placeholder="Q" value="${q}">
<textarea class="a">${a}</textarea>`;
$('faqGrid').appendChild(d);
}

function addBtn(text="",url=""){
let d=document.createElement('div');
d.innerHTML=`<input class="btnText" placeholder="Button text" value="${text}">
<input class="btnUrl" placeholder="URL" value="${url}">`;
$('btnList').appendChild(d);
}

async function load(){
let r=await fetch(API+"/api/admin/get?brand="+$('brand').value,{
headers:{'X-Admin-Token':$('token').value}
});
let d=await r.json();

$('rulesBox').value=(d.draft.rules||[]).join("\n");

$('faqGrid').innerHTML="";
(d.draft.faq||[]).forEach(f=>addFAQ(f.q,f.a));

$('personaTelegram').value=d.draft.personaTelegram||"";
$('personaWeb').value=d.draft.personaWeb||"";

$('btnList').innerHTML="";
(d.draft.telegramButtons||[]).forEach(b=>addBtn(b.text,b.url));
}

async function save(pub){
let faq=[...document.querySelectorAll('#faqGrid div')].map(x=>({
q:x.querySelector('.q').value,
a:x.querySelector('.a').value
}));

let body={
rules:$('rulesBox').value.split("\n"),
faq,
personaTelegram:$('personaTelegram').value,
personaWeb:$('personaWeb').value,
telegramButtons:[...document.querySelectorAll('#btnList div')].map(x=>({
text:x.querySelector('.btnText').value,
url:x.querySelector('.btnUrl').value
}))
};

await fetch(API+(pub?"/api/admin/publish":"/api/admin/save")+"?brand="+$('brand').value,{
method:"POST",
headers:{'Content-Type':'application/json','X-Admin-Token':$('token').value},
body:JSON.stringify(body)
});

alert("Saved");
}

async function savePersona(pub){save(pub);}
async function saveButtons(pub){save(pub);}

</script>
</body>
</html>
