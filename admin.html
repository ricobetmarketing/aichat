<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Support OS • Admin</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

.sidebar{
width:220px;
background:#0f172a;
color:white;
position:fixed;
top:0;
bottom:0;
padding:20px;
}

.sidebar h2{
font-size:18px;
margin-bottom:20px;
}

.menu button{
width:100%;
padding:12px;
border:none;
background:#1e293b;
color:white;
margin-bottom:10px;
border-radius:6px;
cursor:pointer;
}

.menu button:hover{
background:#22c55e;
}

.main{
margin-left:240px;
padding:30px;
}

.card{
background:white;
padding:20px;
border-radius:8px;
margin-bottom:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

textarea{
width:100%;
height:160px;
padding:10px;
border:1px solid #ccc;
border-radius:6px;
}

button.primary{
background:#22c55e;
color:white;
border:none;
padding:10px 20px;
border-radius:6px;
cursor:pointer;
}

button.danger{
background:#ef4444;
color:white;
border:none;
padding:10px 20px;
border-radius:6px;
cursor:pointer;
}

.stats{
display:flex;
gap:20px;
margin-bottom:20px;
}

.stat{
background:white;
flex:1;
padding:20px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.stat h2{
margin:0;
}

</style>
</head>

<body>

<div class="sidebar">

<h2>AI Support OS</h2>

<div class="menu">
<button onclick="showTab('dashboard')">Dashboard</button>
<button onclick="showTab('rules')">Rules</button>
<button onclick="showTab('faq')">FAQ</button>
</div>

</div>

<div class="main">

<h1>Internal Admin v2</h1>

<div id="dashboard">

<div class="stats">

<div class="stat">
<h2 id="total">0</h2>
<p>Total Messages</p>
</div>

<div class="stat">
<h2 id="auto">0</h2>
<p>Auto Replies</p>
</div>

<div class="stat">
<h2 id="escalated">0</h2>
<p>Escalated</p>
</div>

<div class="stat">
<h2 id="confidence">0</h2>
<p>Avg Confidence</p>
</div>

</div>

<div class="card">
<h3>Intent Distribution</h3>
<canvas id="intentChart"></canvas>
</div>

<div class="card">
<h3>Resolution Breakdown</h3>
<canvas id="resolutionChart"></canvas>
</div>

</div>


<div id="rules" style="display:none">

<div class="card">

<h3>Rules (one per line)</h3>

<textarea id="rulesBox"></textarea>

<br><br>

<button class="primary" onclick="saveRules()">Save Draft</button>

<button class="danger" onclick="publish()">Publish</button>

</div>

</div>


<div id="faq" style="display:none">

<div class="card">

<h3>FAQ (JSON)</h3>

<textarea id="faqBox"></textarea>

</div>

</div>

</div>


<script>

const API_BASE="https://ai-chat-backend.marketing-696.workers.dev"
const brand="demo"


function showTab(tab){

document.getElementById("dashboard").style.display="none"
document.getElementById("rules").style.display="none"
document.getElementById("faq").style.display="none"

document.getElementById(tab).style.display="block"

}

async function loadDashboard(){

const res=await fetch(API_BASE+"/admin/analytics?brand="+brand)

const data=await res.json()

const m=data.metrics||{}

document.getElementById("total").innerText=m.totalMessages||0
document.getElementById("auto").innerText=m.autoReply||0
document.getElementById("escalated").innerText=m.escalated||0
document.getElementById("confidence").innerText=(m.avgConfidence||0).toFixed(2)

const intents=m.intents||{}

new Chart(document.getElementById("intentChart"),{
type:"pie",
data:{
labels:Object.keys(intents),
datasets:[{data:Object.values(intents)}]
}
})

new Chart(document.getElementById("resolutionChart"),{
type:"bar",
data:{
labels:["Auto","Escalated"],
datasets:[{data:[m.autoReply||0,m.escalated||0]}]
}
})

}

async function loadRules(){

const res=await fetch(API_BASE+"/admin/get?brand="+brand)

const data=await res.json()

const draft=data.draft||{}

document.getElementById("rulesBox").value=(draft.rules||[]).join("\n")

document.getElementById("faqBox").value=JSON.stringify(draft.faq||[],null,2)

}

async function saveRules(){

const rules=document.getElementById("rulesBox").value.split("\n")

const faq=JSON.parse(document.getElementById("faqBox").value)

await fetch(API_BASE+"/admin/save?brand="+brand,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
rules,
faq
})
})

alert("Draft Saved")

}

async function publish(){

await fetch(API_BASE+"/admin/publish?brand="+brand,{
method:"POST"
})

alert("AI Training Published")

}

loadDashboard()
loadRules()

</script>

</body>
</html>
