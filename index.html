<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Smart Support • Category Menu</title>

<style>
:root{--primary:#16a34a;--primary2:#15803d;--bg:#f8fafc;--panel:#fff;--text:#0f172a;--muted:#64748b;--border:#e2e8f0}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;background:var(--bg);display:grid;place-items:center;min-height:100vh}

.wrap{width:100%;max-width:460px;height:94vh;background:var(--panel);border-radius:24px;box-shadow:0 20px 50px rgba(0,0,0,.1);display:flex;flex-direction:column;overflow:hidden;border:1px solid var(--border)}

.hd{background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;padding:20px;display:flex;gap:12px;align-items:center}
.av{width:45px;height:45px;border-radius:50%;background:#fff;color:var(--primary);display:grid;place-items:center;font-weight:900;font-size:18px}
.hdt h3{margin:0;font-size:16px;font-weight:900}.hdt span{font-size:12px;opacity:.9}

.bd{flex:1;padding:20px;overflow:auto;display:flex;flex-direction:column;gap:12px;background:#fcfcfc}

.msg{max-width:85%;padding:12px 16px;border-radius:18px;font-size:14px;line-height:1.5;white-space:pre-wrap}
.user{align-self:flex-end;background:var(--primary);color:#fff}
.bot{align-self:flex-start;background:#fff;border:1px solid var(--border)}
.sys{align-self:center;background:#fff7ed;border:1px solid #fde68a;font-size:12px;color:#9a3412;padding:6px 14px;border-radius:999px}

.menu-box{display:flex;flex-direction:column;gap:8px;margin-top:10px}
.menu-btn{background:#fff;border:1px solid var(--primary);color:var(--primary);padding:10px;border-radius:12px;cursor:pointer;text-align:center}
.menu-btn:hover{background:var(--primary);color:#fff}

.ft{border-top:1px solid var(--border);padding:15px;display:flex;gap:10px;background:#fff}
.ta{flex:1;border:1px solid var(--border);border-radius:15px;padding:12px;background:#f8fafc}
.btn-send{background:var(--primary);border:0;color:#fff;width:42px;height:42px;border-radius:50%;cursor:pointer}

/* 🔥 New button */
.push-btn{
  margin-top:10px;
  background:#0ea5e9;
  color:#fff;
  padding:10px;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
  font-weight:600;
}
.push-btn:hover{background:#0284c7}
</style>
</head>

<body>

<div class="wrap">
  <div class="hd">
    <div class="av">AI</div>
    <div class="hdt">
      <h3>Customer Support</h3>
      <span>Online • How can we help?</span>
    </div>
  </div>

  <div class="bd" id="chat">

    <div class="msg bot">
      Hello! 👋 Welcome to our support. 
      <br>Please select a category to get started:

      <!-- 🔥 PUSH BUTTON -->
      <div class="push-btn" onclick="initPush()">
        🔔 Enable Notifications
      </div>

      <div class="menu-box">
        <div class="menu-btn" onclick="quickAsk('Deposit')">💰 Deposit Issue</div>
        <div class="menu-btn" onclick="quickAsk('Withdrawal')">🏧 Withdrawal Issue</div>
        <div class="menu-btn" onclick="quickAsk('Bonus')">🎁 Bonus & Promotions</div>
        <div class="menu-btn" onclick="quickAsk('Agent')">👤 Talk to Real Agent</div>
      </div>
    </div>

  </div>

  <div class="ft">
    <textarea class="ta" id="input" rows="1" placeholder="Type a message..."></textarea>
    <button class="btn-send" id="send">➤</button>
  </div>
</div>

<!-- 🔥 Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBgV0PcWtjr2R1gAeIR0Obzo_Uufo34K3E",
  authDomain: "ai-live-chat-d30d7.firebaseapp.com",
  projectId: "ai-live-chat-d30d7",
  storageBucket: "ai-live-chat-d30d7.firebasestorage.app",
  messagingSenderId: "330505566191",
  appId: "1:330505566191:web:1cb7244d16656d6a05a81a"
};

firebase.initializeApp(firebaseConfig);

function initPush() {
  Notification.requestPermission().then(permission => {
    if (permission === "granted") {

      navigator.serviceWorker.register('/aichat/firebase-messaging-sw.js')
        .then((registration) => navigator.serviceWorker.ready.then(() => registration))
        .then((registration) => {

          const messaging = firebase.messaging();

          messaging.getToken({
            vapidKey: "BPylpOKbD8Ij5e4pUmIXxNiqY6jl0Rw8PL7Fa6Z2KInayHuBCTNZqtgzUAGff8PNXnMqou61vziBfWYerMnSmFU",
            serviceWorkerRegistration: registration
          }).then((token) => {
            console.log("TOKEN:", token);
          });

          // 🔥 SHOW MESSAGE INSIDE CHAT
          messaging.onMessage((payload) => {
            add("🔔 " + payload.notification.title + "\n" + payload.notification.body, "bot");
          });

        });
    }
  });
}
</script>

<script>
const API_BASE = "https://ai-chat-backend.marketing-696.workers.dev";
const BRAND = "demo";

const chat = document.getElementById("chat");
const input = document.getElementById("input");

function add(text, cls) {
  const d = document.createElement("div");
  d.className = "msg " + cls;
  d.textContent = text;
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

function quickAsk(text) {
  send(text);
}

async function send(overrideText) {
  const text = overrideText || input.value.trim();
  if (!text) return;

  add(text, "user");
  if(!overrideText) input.value = "";

  try {
    const r = await fetch(`${API_BASE}/api/chat?brand=${encodeURIComponent(BRAND)}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text })
    });

    const data = await r.json();

    setTimeout(() => {
        add(data.reply || "I'm still learning. Please try another keyword.", "bot");
    }, 500);

  } catch (e) {
    add("Connection error. Please try again.", "bot");
  }
}

document.getElementById("send").onclick = () => send();
input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});
</script>

</body>
</html>
