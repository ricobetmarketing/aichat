<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Support Console</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: "Segoe UI", Arial, sans-serif;
  background: #f5f7fa;
}

.header {
  background: #0f172a;
  color: white;
  padding: 16px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.container {
  display: grid;
  grid-template-columns: 280px 1fr;
  height: calc(100vh - 60px);
}

.sidebar {
  background: white;
  border-right: 1px solid #e5e7eb;
  padding: 20px;
}

.sidebar h3 {
  margin-top: 0;
  font-size: 16px;
  margin-bottom: 15px;
}

.sidebar button {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 6px;
  border: 1px solid #e5e7eb;
  background: #fafafa;
  cursor: pointer;
}

.sidebar button:hover {
  background: #f1f5f9;
}

.chat-area {
  display: flex;
  flex-direction: column;
}

.chat-window {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
}

.message {
  margin-bottom: 15px;
}

.message.user {
  text-align: right;
}

.bubble {
  display: inline-block;
  padding: 12px 16px;
  border-radius: 14px;
  max-width: 70%;
  font-size: 14px;
}

.user .bubble {
  background: #0f172a;
  color: white;
}

.bot .bubble {
  background: #e2e8f0;
  color: #111827;
}

.input-area {
  display: flex;
  padding: 15px;
  background: white;
  border-top: 1px solid #e5e7eb;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 6px;
  border: 1px solid #d1d5db;
}

button.send {
  margin-left: 10px;
  padding: 10px 15px;
  border-radius: 6px;
  border: none;
  background: #0f172a;
  color: white;
  cursor: pointer;
}

.status {
  font-size: 13px;
}
</style>
</head>

<body>

<div class="header">
  <div><strong>AI Customer Support (Brazil & Mexico)</strong></div>
  <div class="status" id="status">AI Mode: OFF</div>
</div>

<div class="container">

  <div class="sidebar">
    <h3>Quick FAQ</h3>
    <button onclick="showFAQ('deposit')">Deposit</button>
    <button onclick="showFAQ('withdrawal')">Withdrawal</button>
    <button onclick="showFAQ('bonus')">Bonus</button>
    <button onclick="showFAQ('login')">Login</button>
    <hr>
    <button onclick="enableAI()">Enable AI Assistance</button>
    <button onclick="escalate()">Contact Human Support</button>
  </div>

  <div class="chat-area">
    <div class="chat-window" id="chat"></div>

    <div class="input-area">
      <input id="input" placeholder="Type your message..." />
      <button class="send" onclick="sendMessage()">Send</button>
    </div>
  </div>

</div>

<script>

const API_URL = "https://ai-chat-backend.marketing-696.workers.dev/";

let aiEnabled = false;

const FAQ = {
  deposit: `
Deposit Guide:
1. Go to Cashier
2. Select Deposit
3. Choose payment method (PIX, SPEI, OXXO, Card)
4. Confirm transaction

Pending deposits usually resolve within minutes.
`,
  withdrawal: `
Withdrawal Guide:
• Processing time depends on method
• KYC verification may be required
• Bonus wagering must be completed
`,
  bonus: `
Bonus Information:
• Review wagering requirements
• Check expiry dates
• Ensure promotion is activated
`,
  login: `
Login Help:
• Use "Forgot Password"
• Clear browser cache
• Ensure correct credentials
`
};

function addMessage(text, type="bot") {
  const chat = document.getElementById("chat");
  const msg = document.createElement("div");
  msg.className = "message " + type;

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.innerText = text;

  msg.appendChild(bubble);
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

function showFAQ(type) {
  addMessage(FAQ[type]);
  addMessage("Did this resolve your issue? You may enable AI assistance if needed.");
}

function enableAI() {
  aiEnabled = true;
  document.getElementById("status").innerText = "AI Mode: ON";
  addMessage("AI assistance enabled. Please type your question.");
}

function escalate() {
  addMessage("For security or account-related issues, please contact our human support team.");
}

async function sendMessage() {
  const input = document.getElementById("input");
  const message = input.value.trim();
  if (!message) return;

  addMessage(message, "user");
  input.value = "";

  if (!aiEnabled) {
    addMessage("Please use FAQ or enable AI assistance.");
    return;
  }

  const sensitive = /(withdraw|chargeback|fraud|blocked|kyc)/i;
  if (sensitive.test(message)) {
    addMessage("This issue requires human support for security reasons.");
    return;
  }

  addMessage("Processing...");

  const response = await fetch(API_URL, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ message })
  });

  const data = await response.json();
  addMessage(data.reply || "Unable to answer.");
}

addMessage("Welcome to Customer Support. Please select a FAQ category or enable AI assistance.");

</script>

</body>
</html>
