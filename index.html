<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Customer Support</title>

<style>
body{
font-family:system-ui;
background:#f4f6f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0
}

.wrap{
width:420px;
height:88vh;
background:#fff;
border-radius:16px;
box-shadow:0 15px 40px rgba(0,0,0,.08);
display:flex;
flex-direction:column;
overflow:hidden
}

.header{
background:#16a34a;
color:#fff;
padding:16px;
font-weight:bold
}

.chat{
flex:1;
overflow:auto;
padding:16px;
display:flex;
flex-direction:column;
gap:10px
}

.msg{
max-width:80%;
padding:10px 14px;
border-radius:14px;
font-size:14px
}

.user{
background:#16a34a;
color:#fff;
align-self:flex-end
}

.bot{
background:#f1f5f9;
align-self:flex-start
}

.footer{
display:flex;
border-top:1px solid #e5e7eb
}

input{
flex:1;
border:0;
padding:12px
}

button{
background:#16a34a;
color:#fff;
border:0;
padding:12px 18px;
cursor:pointer
}
</style>
</head>

<body>

<div class="wrap">

<div class="header">
Customer Support
</div>

<div class="chat" id="chat">
<div class="msg bot">Hello 👋 How can we help you today?</div>
</div>

<div class="footer">
<input id="input" placeholder="Type message..."/>
<button onclick="send()">Send</button>
</div>

</div>

<script>

const API="https://ai-chat-backend.marketing-696.workers.dev"
const BRAND="demo"

const chat=document.getElementById("chat")

function add(text,type){
const div=document.createElement("div")
div.className="msg "+type
div.innerHTML=text.replace(/\n/g,"<br>")
chat.appendChild(div)
chat.scrollTop=chat.scrollHeight
}

async function send(){

const input=document.getElementById("input")
const text=input.value.trim()

if(!text) return

add(text,"user")
input.value=""

const r=await fetch(API+"/api/chat?brand="+BRAND,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:text})
})

const data=await r.json()

add(data.reply || "Okay","bot")

}

document.getElementById("input").addEventListener("keydown",e=>{
if(e.key==="Enter") send()
})

</script>

</body>
</html>
