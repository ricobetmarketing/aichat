<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Support</title>

  <style>
    :root {
      --primary: #16a34a;
      --primary-dark: #15803d;
      --bg: #f4f6f9;
      --chat-bg: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
    }

    * {
      box-sizing: border-box
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .chat-wrapper {
      width: 100%;
      max-width: 420px;
      height: 92vh;
      background: var(--chat-bg);
      border-radius: 18px;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.08);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* HEADER */
    .chat-header {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: white;
      color: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 16px;
    }

    .header-text {
      flex: 1;
    }

    .header-text h3 {
      margin: 0;
      font-size: 15px;
      font-weight: 700;
    }

    .header-text span {
      font-size: 12px;
      opacity: .9;
    }

    /* CHAT AREA */
    .chat-body {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #fafafa;
    }

    .message {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.4;
    }

    .user {
      align-self: flex-end;
      background: var(--primary);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .bot {
      align-self: flex-start;
      background: white;
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .system {
      align-self: center;
      background: #fff7ed;
      border: 1px solid #fde68a;
      font-size: 12px;
      color: #92400e;
      padding: 6px 12px;
      border-radius: 20px;
    }

    /* INPUT */
    .chat-input {
      border-top: 1px solid var(--border);
      padding: 12px;
      display: flex;
      gap: 8px;
      background: white;
    }

    .chat-input textarea {
      flex: 1;
      resize: none;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px;
      font-size: 14px;
      outline: none;
    }

    .chat-input textarea:focus {
      border-color: var(--primary);
    }

    .chat-input button {
      background: var(--primary);
      border: none;
      color: white;
      padding: 10px 16px;
      border-radius: 14px;
      cursor: pointer;
      font-weight: 600;
    }

    .chat-input button:hover {
      background: var(--primary-dark);
    }

    /* TYPING */
    .typing {
      font-size: 12px;
      color: var(--muted);
      padding-left: 4px;
    }
  </style>
</head>

<body style="visibility: visible;">

  <div class="chat-wrapper">
    <div class="chat-header">
      <div class="avatar">CS</div>
      <div class="header-text">
        <h3>Customer Support</h3>
        <span>Online • Reply within minutes</span>
      </div>
    </div>

    <div class="chat-body" id="chat">
      <div class="message bot">
        Hello 👋 Welcome to Customer Support.<br>
        How can we assist you today?
      </div>
      <div class="message user">hello</div>
      <div class="message bot">This is a demo AI response for: hello</div>
    </div>

    <div class="chat-input">
      <textarea id="input" rows="1" placeholder="Type your message..."></textarea>
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    const API_BASE = "https://ai-chat-backend.marketing-696.workers.dev"; // change if needed

    const chat = document.getElementById("chat");
    const input = document.getElementById("input");

    function addMessage(text, type) {
      const div = document.createElement("div");
      div.className = "message " + type;
      div.innerHTML = text.replace(/\n/g, "<br>");
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function addTyping() {
      const div = document.createElement("div");
      div.className = "typing";
      div.id = "typing";
      div.innerText = "Support is typing...";
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function removeTyping() {
      const t = document.getElementById("typing");
      if (t) t.remove();
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, "user");
      input.value = "";
      addTyping();

      try {
        const res = await fetch(API_BASE, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            message: text
          })
        });

        const data = await res.json();
        removeTyping();

        if (data.action === "escalate") {
          addMessage("For security reasons, this request has been forwarded to a specialist. Please wait while we connect you.", "bot");
          addMessage("A human agent will join shortly.", "system");
        } else {
          addMessage(data.reply || "Thank you. Our team will review this shortly.", "bot");
        }

      } catch (err) {
        removeTyping();
        addMessage("Connection error. Please try again later.", "system");
      }
    }

    input.addEventListener("keydown", function(e) {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  </script>


</body>

</html>
