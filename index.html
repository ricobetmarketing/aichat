<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Smart Support</title>

<style>
:root{--primary:#16a34a;--bg:#f8fafc;--panel:#fff;--border:#e2e8f0}
body{margin:0;font-family:system-ui;background:var(--bg);display:grid;place-items:center;height:100vh}

/* 🔔 TOP POPUP */
.push-banner{
  position:fixed;
  top:0;
  left:0;
  right:0;
  background:#0ea5e9;
  color:#fff;
  padding:12px;
  text-align:center;
  font-weight:600;
  z-index:9999;
  display:flex;
  justify-content:center;
  gap:10px;
}

.push-banner button{
  background:#fff;
  color:#0ea5e9;
  border:0;
  padding:6px 12px;
  border-radius:6px;
  cursor:pointer;
  font-weight:600;
}

/* CHAT UI */
.wrap{width:100%;max-width:460px;height:94vh;background:#fff;border-radius:24px;display:flex;flex-direction:column;overflow:hidden;margin-top:60px}

.hd{background:#16a34a;color:#fff;padding:16px}
.bd{flex:1;padding:20px;overflow:auto}
.msg{background:#fff;border:1px solid var(--border);padding:12px;border-radius:12px;margin-bottom:10px}
.ft{padding:15px;border-top:1px solid var(--border);display:flex;gap:10px}
.ta{flex:1;padding:10px;border-radius:10px;border:1px solid var(--border)}
</style>
</head>

<body>

<!-- 🔔 TOP BANNER -->
<div class="push-banner" id="pushBanner">
  🔔 Enable notifications to get updates
  <button onclick="initPush()">Enable</button>
  <button onclick="closeBanner()">X</button>
</div>

<div class="wrap">
  <div class="hd">Customer Support</div>

  <div class="bd" id="chat">
    <div class="msg">
      Hello! 👋 Welcome to our support.<br><br>
      Please select a category to get started:
    </div>
  </div>

  <div class="ft">
    <input class="ta" placeholder="Type a message..."/>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBgV0PcWtjr2R1gAeIR0Obzo_Uufo34K3E",
  authDomain: "ai-live-chat-d30d7.firebaseapp.com",
  projectId: "ai-live-chat-d30d7",
  messagingSenderId: "330505566191",
  appId: "1:330505566191:web:1cb7244d16656d6a05a81a"
};

firebase.initializeApp(firebaseConfig);

function closeBanner(){
  document.getElementById("pushBanner").style.display = "none";
}

function initPush() {
  console.log("Clicked Enable Push");

  Notification.requestPermission().then(permission => {
    console.log("Permission:", permission);

    if (permission === "granted") {

      navigator.serviceWorker.register('/aichat/firebase-messaging-sw.js')
        .then((registration) => navigator.serviceWorker.ready.then(() => registration))
        .then((registration) => {

          const messaging = firebase.messaging();

          messaging.getToken({
            vapidKey: "BPylpOKbD8Ij5e4pUmIXxNiqY6jl0Rw8PL7Fa6Z2KInayHuBCTNZqtgzUAGff8PNXnMqou61vziBfWYerMnSmFU",
            serviceWorkerRegistration: registration
          }).then((token) => {
            console.log("TOKEN:", token);
            alert("✅ Push enabled successfully!");
            closeBanner();
          });

          messaging.onMessage((payload) => {
            console.log("Message:", payload);

            const chat = document.getElementById("chat");
            const d = document.createElement("div");
            d.className = "msg";
            d.innerText = "🔔 " + payload.notification.title + "\n" + payload.notification.body;
            chat.appendChild(d);
          });

        }).catch(err => {
          console.error("SW error:", err);
        });

    } else {
      alert("❌ Permission denied");
    }
  });
}
</script>

</body>
</html>
