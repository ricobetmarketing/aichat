<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Smart Support • Category Menu</title>
<style>
:root{--primary:#16a34a;--primary2:#15803d;--bg:#f8fafc;--panel:#fff;--text:#0f172a;--muted:#64748b;--border:#e2e8f0}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;background:var(--bg);display:grid;place-items:center;min-height:100vh}
.wrap{width:100%;max-width:460px;height:94vh;background:var(--panel);border-radius:24px;box-shadow:0 20px 50px rgba(0,0,0,.1);display:flex;flex-direction:column;overflow:hidden;border:1px solid var(--border)}
.hd{background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;padding:20px;display:flex;gap:12px;align-items:center}
.av{width:45px;height:45px;border-radius:50%;background:#fff;color:var(--primary);display:grid;place-items:center;font-weight:900;font-size:18px}
.hdt{flex:1}.hdt h3{margin:0;font-size:16px;font-weight:900}.hdt span{font-size:12px;opacity:.9}
.bd{flex:1;padding:20px;overflow:auto;display:flex;flex-direction:column;gap:12px;background:#fcfcfc}
.msg{max-width:85%;padding:12px 16px;border-radius:18px;font-size:14px;line-height:1.5;white-space:pre-wrap;animation:fadeIn 0.3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.user{align-self:flex-end;background:var(--primary);color:#fff;border-bottom-right-radius:4px}
.bot{align-self:flex-start;background:#fff;border:1px solid var(--border);border-bottom-left-radius:4px;color:var(--text)}
.sys{align-self:center;background:#fff7ed;border:1px solid #fde68a;font-size:12px;color:#9a3412;padding:6px 14px;border-radius:999px}

/* Category Menu Style */
.menu-box{display:flex;flex-direction:column;gap:8px;margin-top:10px}
.menu-btn{background:#fff;border:1px solid var(--primary);color:var(--primary);padding:10px;border-radius:12px;cursor:pointer;font-size:13px;font-weight:600;text-align:center;transition:0.2s}
.menu-btn:hover{background:var(--primary);color:#fff}

.ft{border-top:1px solid var(--border);padding:15px;display:flex;gap:10px;background:#fff;align-items:center}
.ta{flex:1;resize:none;border:1px solid var(--border);border-radius:15px;padding:12px;font-size:14px;outline:none;background:#f8fafc}
.btn-send{background:var(--primary);border:0;color:#fff;width:42px;height:42px;border-radius:50%;cursor:pointer;display:grid;place-items:center}
</style>
</head>
<body>

<div class="wrap">
  <div class="hd">
    <div class="av">AI</div>
    <div class="hdt">
      <h3>Customer Support</h3>
      <span>Online • How can we help?</span>
    </div>
  </div>

  <div class="bd" id="chat">
    <div class="msg bot">
      Hello! 👋 Welcome to our support. 
      <br>Please select a category to get started:
      <div class="menu-box">
        <div class="menu-btn" onclick="quickAsk('Deposit')">💰 Deposit Issue</div>
        <div class="menu-btn" onclick="quickAsk('Withdrawal')">🏧 Withdrawal Issue</div>
        <div class="menu-btn" onclick="quickAsk('Bonus')">🎁 Bonus & Promotions</div>
        <div class="menu-btn" onclick="quickAsk('Agent')">👤 Talk to Real Agent</div>
      </div>
    </div>
  </div>

  <div class="ft">
    <textarea class="ta" id="input" rows="1" placeholder="Type a message..."></textarea>
    <button class="btn-send" id="send">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
    </button>
  </div>
</div>

<script>
const API_BASE = "https://ai-chat-backend.marketing-696.workers.dev";
const BRAND = "demo";

const chat = document.getElementById("chat");
const input = document.getElementById("input");

function add(text, cls) {
  const d = document.createElement("div");
  d.className = "msg " + cls;
  d.textContent = text;
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

function quickAsk(text) {
  // 模拟用户发送了点击的选项
  send(text);
}

async function send(overrideText) {
  const text = overrideText || input.value.trim();
  if (!text) return;

  add(text, "user");
  if(!overrideText) input.value = "";

  try {
    const r = await fetch(`${API_BASE}/api/chat?brand=${encodeURIComponent(BRAND)}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text })
    });

    const data = await r.json();
    
    // 如果返回的内容包含引导信息或 FAQ
    setTimeout(() => {
        add(data.reply || "I'm still learning. Please try another keyword.", "bot");
        if(data.action === "escalate") {
            const d = document.createElement("div");
            d.className = "sys";
            d.innerText = "Connecting you to an agent...";
            chat.appendChild(d);
        }
    }, 500);

  } catch (e) {
    add("Connection error. Please try again.", "bot");
  }
}

document.getElementById("send").onclick = () => send();
input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});
</script>
</body>
</html>
