<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Customer Support • AI</title>
<style>
:root{--primary:#16a34a;--primary2:#15803d;--bg:#f4f6f9;--panel:#fff;--text:#0f172a;--muted:#64748b;--border:#e5e7eb}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;background:var(--bg);display:grid;place-items:center;min-height:100vh}
.wrap{width:100%;max-width:460px;height:92vh;background:var(--panel);border-radius:18px;box-shadow:0 15px 40px rgba(0,0,0,.08);display:flex;flex-direction:column;overflow:hidden}
.hd{background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;padding:16px;display:flex;gap:12px;align-items:center}
.av{width:42px;height:42px;border-radius:999px;background:#fff;color:var(--primary);display:grid;place-items:center;font-weight:900}
.hdt{flex:1}
.hdt h3{margin:0;font-size:15px;font-weight:900}
.hdt span{font-size:12px;opacity:.9}
.badge{font-size:11px;background:rgba(255,255,255,.18);padding:6px 10px;border-radius:999px}
.bd{flex:1;padding:16px;overflow:auto;display:flex;flex-direction:column;gap:10px;background:#fafafa}
.msg{max-width:84%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.4;white-space:pre-wrap}
.user{align-self:flex-end;background:var(--primary);color:#fff;border-bottom-right-radius:6px}
.bot{align-self:flex-start;background:#fff;border:1px solid var(--border);border-bottom-left-radius:6px}
.sys{align-self:center;background:#fff7ed;border:1px solid #fde68a;font-size:12px;color:#92400e;padding:6px 12px;border-radius:999px}
.ft{border-top:1px solid var(--border);padding:12px;display:flex;gap:8px;background:#fff}
.ta{flex:1;resize:none;border:1px solid var(--border);border-radius:14px;padding:10px;font-size:14px;outline:none}
.ta:focus{border-color:var(--primary)}
.btn{background:var(--primary);border:0;color:#fff;padding:10px 16px;border-radius:14px;cursor:pointer;font-weight:800}
.btn:hover{background:var(--primary2)}
.small{font-size:12px;color:var(--muted);padding:0 16px 12px}
a{color:inherit}
</style>
</head>
<body>
<div class="wrap">
  <div class="hd">
    <div class="av">CS</div>
    <div class="hdt">
      <h3>Customer Support</h3>
      <span>Online • Reply within minutes</span>
    </div>
    <div class="badge" id="badge">AI Ready</div>
  </div>

  <div class="bd" id="chat">
    <div class="msg bot">Hello 👋 How can we help you today?</div>
  </div>

  <div class="small">
    Admin: <a href="./admin.html">admin</a> • Analytics: <a href="./analytics.html">analytics</a> • Agent: <a href="./agent.html">agent</a>
  </div>

  <div class="ft">
    <textarea class="ta" id="input" rows="1" placeholder="Type your message..."></textarea>
    <button class="btn" id="send">Send</button>
  </div>
</div>

<script>
const API_BASE = "https://ai-chat-backend.marketing-696.workers.dev";
const BRAND = "demo";

const chat=document.getElementById("chat");
const input=document.getElementById("input");
const badge=document.getElementById("badge");

let since=0;

function add(text, cls){
  const d=document.createElement("div");
  d.className="msg "+cls;
  d.textContent=text||"";
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
}
function sys(text){
  const d=document.createElement("div");
  d.className="sys";
  d.innerHTML = text;
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
}

async function poll(){
  try{
    const r=await fetch(API_BASE+"/api/events?brand="+encodeURIComponent(BRAND)+"&since="+since);
    const data=await r.json();
    const events=data.events||[];
    for(const e of events){
      since=e.id;
      if(e.type==="system") sys(e.text);
      if(e.type==="agent") add("Agent: "+e.text,"bot");
    }
  }catch(e){}
  setTimeout(poll, 1500);
}
poll();

async function send(){
  const text=input.value.trim();
  if(!text) return;
  
  add(text,"user");
  input.value="";
  badge.textContent="Thinking..."; // 状态栏切换

  try{
    const r=await fetch(API_BASE+"/api/chat?brand="+encodeURIComponent(BRAND),{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:text})
    });
    
    const data = await r.json();
    badge.textContent="AI Ready";

    // 逻辑分支处理
    if(data.action === "escalate"){
      add(data.reply, "bot");
      sys("Connecting to a live agent...");
    } else if(data.source === "faq") {
      // 如果是 FAQ 命中的，可以加个小动画感
      setTimeout(() => add(data.reply, "bot"), 300);
    } else {
      // 如果 AI (OpenAI) 报错或未连接，显示保底回复
      const finalReply = data.reply || "I'm sorry, I don't have an answer for that yet. Would you like to speak to an agent?";
      add(finalReply, "bot");
    }
  } catch(e){
    badge.textContent="AI Ready";
    sys("Oops! Connection lost. Please try again.");
  }
}

document.getElementById("send").onclick=send;
input.addEventListener("keydown",(e)=>{
  if(e.key==="Enter" && !e.shiftKey){e.preventDefault();send();}
});
</script>
</body>
</html>
