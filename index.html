<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Smart Support • Category Menu</title>

<style>
:root{--primary:#16a34a;--primary2:#15803d;--bg:#f8fafc;--panel:#fff;--text:#0f172a;--muted:#64748b;--border:#e2e8f0}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui;background:var(--bg);display:grid;place-items:center;min-height:100vh}

/* 🔔 TOP BANNER */
.push-banner{
  position:fixed;
  top:0;
  left:0;
  right:0;
  background:#0ea5e9;
  color:#fff;
  padding:12px;
  text-align:center;
  font-weight:600;
  z-index:9999;
}
.push-banner button{
  margin-left:10px;
  background:#fff;
  border:0;
  padding:5px 10px;
  border-radius:6px;
  cursor:pointer;
}

/* ORIGINAL UI */
.wrap{width:100%;max-width:460px;height:94vh;background:#fff;border-radius:24px;box-shadow:0 20px 50px rgba(0,0,0,.1);display:flex;flex-direction:column;overflow:hidden;margin-top:50px}
.hd{background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;padding:20px}
.bd{flex:1;padding:20px;overflow:auto;display:flex;flex-direction:column;gap:12px;background:#fcfcfc}
.msg{max-width:85%;padding:12px 16px;border-radius:18px;background:#fff;border:1px solid #e2e8f0}
.menu-box{display:flex;flex-direction:column;gap:8px;margin-top:10px}
.menu-btn{background:#fff;border:1px solid #16a34a;color:#16a34a;padding:10px;border-radius:12px;cursor:pointer}
.ft{border-top:1px solid #e2e8f0;padding:15px;display:flex;gap:10px}
.ta{flex:1;border:1px solid #e2e8f0;border-radius:15px;padding:12px}
</style>
</head>

<body>

<!-- 🔔 CLEAN TOP BANNER -->
<div class="push-banner" id="pushBanner">
  🔔 Enable notifications for updates
  <button onclick="initPush()">Enable</button>
</div>

<div class="wrap">
  <div class="hd">Customer Support</div>

  <div class="bd" id="chat">
    <div class="msg">
      Hello! 👋 Welcome to our support. 
      <br>Please select a category to get started:
      <div class="menu-box">
        <div class="menu-btn" onclick="quickAsk('Deposit')">💰 Deposit Issue</div>
        <div class="menu-btn" onclick="quickAsk('Withdrawal')">🏧 Withdrawal Issue</div>
        <div class="menu-btn" onclick="quickAsk('Bonus')">🎁 Bonus & Promotions</div>
        <div class="menu-btn" onclick="quickAsk('Agent')">👤 Talk to Real Agent</div>
      </div>
    </div>
  </div>

  <div class="ft">
    <textarea class="ta" id="input" rows="1" placeholder="Type a message..."></textarea>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBgV0PcWtjr2R1gAeIR0Obzo_Uufo34K3E",
  authDomain: "ai-live-chat-d30d7.firebaseapp.com",
  projectId: "ai-live-chat-d30d7",
  messagingSenderId: "330505566191",
  appId: "1:330505566191:web:1cb7244d16656d6a05a81a"
};

firebase.initializeApp(firebaseConfig);

function initPush() {
  Notification.requestPermission().then(permission => {
    if (permission === "granted") {

      navigator.serviceWorker.register('/aichat/firebase-messaging-sw.js')
        .then((registration) => navigator.serviceWorker.ready.then(() => registration))
        .then((registration) => {

          const messaging = firebase.messaging();

          messaging.getToken({
            vapidKey: "BPylpOKbD8Ij5e4pUmIXxNiqY6jl0Rw8PL7Fa6Z2KInayHuBCTNZqtgzUAGff8PNXnMqou61vziBfWYerMnSmFU",
            serviceWorkerRegistration: registration
          }).then((token) => {
            console.log("TOKEN:", token);
            alert("✅ Notifications enabled!");
            document.getElementById("pushBanner").style.display = "none";
          });

          messaging.onMessage((payload) => {
            const chat = document.getElementById("chat");
            const d = document.createElement("div");
            d.className = "msg";
            d.innerText = "🔔 " + payload.notification.title;
            chat.appendChild(d);
          });

        });

    }
  });
}
</script>

<script>
const API_BASE = "https://ai-chat-backend.marketing-696.workers.dev";
const BRAND = "demo";

const chat = document.getElementById("chat");
const input = document.getElementById("input");

function add(text, cls) {
  const d = document.createElement("div");
  d.className = "msg " + cls;
  d.textContent = text;
  chat.appendChild(d);
}

function quickAsk(text) {
  send(text);
}

async function send(overrideText) {
  const text = overrideText || input.value.trim();
  if (!text) return;

  add(text, "user");
}
</script>

</body>
</html>
