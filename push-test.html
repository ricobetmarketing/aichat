<body style="font-family:sans-serif;padding:20px;">
  
  <h2>Firebase Push Test</h2>
  <button onclick="initPush()">Enable Push</button>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js"></script>

  <script>
const firebaseConfig = {
  apiKey: "AIzaSyBgV0PcWtjr2R1gAeIR0Obzo_Uufo34K3E",
  authDomain: "ai-live-chat-d30d7.firebaseapp.com",
  projectId: "ai-live-chat-d30d7",
  storageBucket: "ai-live-chat-d30d7.firebasestorage.app",
  messagingSenderId: "330505566191",
  appId: "1:330505566191:web:1cb7244d16656d6a05a81a",
  measurementId: "G-212YLPHQB7"
};

    firebase.initializeApp(firebaseConfig);
    const messaging = firebase.messaging();

    function initPush() {
      Notification.requestPermission().then(permission => {
        if (permission === "granted") {
          messaging.getToken({
            vapidKey: "YOUR_VAPID_KEY"
          }).then((token) => {
            console.log("TOKEN:", token);
            alert("Token generated! Check console.");
          }).catch(err => {
            console.error(err);
          });
        } else {
          alert("Permission denied");
        }
      });
    }
  </script>
