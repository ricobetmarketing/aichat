<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>AI Support OS • Analytics</title>
<style>
body{margin:0;font-family:system-ui;background:#f3f4f6}
.wrap{max-width:980px;margin:22px auto;padding:0 14px}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;box-shadow:0 10px 25px rgba(2,6,23,.06);padding:16px;margin-bottom:14px}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input{border:1px solid #e5e7eb;border-radius:10px;padding:10px;font:inherit}
.btn{border:0;border-radius:10px;padding:10px 14px;cursor:pointer;font-weight:900;background:#22c55e;color:#052e16}
pre{background:#0b1220;color:#e5e7eb;border-radius:10px;padding:12px;overflow:auto}
.small{font-size:12px;color:#64748b}
</style>
</head>
<body>
<div class="wrap">
  <h1>Analytics</h1>
  <div class="card">
    <div class="row">
      <input id="brand" value="demo" placeholder="brand"/>
      <input id="token" type="password" placeholder="ADMIN_TOKEN"/>
      <button class="btn" id="load">Load</button>
      <a class="small" href="./index.html">Chat</a>
      <a class="small" href="./admin.html">Admin</a>
      <a class="small" href="./agent.html">Agent</a>
    </div>
  </div>
  <div class="card">
    <pre id="out">—</pre>
  </div>
</div>

<script>
const API_BASE = "https://ai-chat-backend.marketing-696.workers.dev";
const $ = id=>document.getElementById(id);

$("load").onclick = async ()=>{
  const brand = ($("brand").value||"demo").trim()||"demo";
  const token = $("token").value;
  const r = await fetch(API_BASE+"/api/admin/analytics?brand="+encodeURIComponent(brand), {
    headers: {"X-Admin-Token": token}
  });
  if(!r.ok) return alert("Load failed. Check ADMIN_TOKEN.");
  const data = await r.json();
  $("out").textContent = JSON.stringify(data.metrics||{}, null, 2);
};
</script>
</body>
</html>
